<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>13 · 낡은 책방</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
  <div class="mv-wrap" id="mv">
    <div class="bg"></div>
    <div class="particles" id="particles"></div>
    <div class="frame-layer" id="frameLayer">
      <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
    </div>

    <div class="title-layer">
      <div class="title-main" id="titleMain" data-preview-title>오래된 책방</div>
    </div>

    <div class="sub-layer" id="subLayer">
      <div class="sub-card">
        <style>
    .sub-anim.active .bk6tqf4{animation:bkFlip6tqf4 0.8s cubic-bezier(0.34,1.3,0.64,1) forwards;}
    @keyframes bkFlip6tqf4{0%{transform:rotateY(-90deg);opacity:0;}100%{transform:rotateY(0deg);opacity:1;}}</style>
    <div class="sub-anim sub-item">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <g class="bk6tqf4" style="opacity:0;perspective:100px">
          <path d="M5 6C5 6 5 23 5 23L14 26L23 23V6L14 9Z" stroke="#a88848" stroke-width="1.3" fill="rgba(168,136,72,0.1)"/>
          <path d="M14 9L14 26" stroke="#a88848" stroke-width="0.8" opacity="0.5"/>
          <path d="M5 6L14 9L23 6" stroke="#a88848" stroke-width="1.3" fill="none"/>
          <path d="M8 14L12 15" stroke="#a88848" stroke-width="0.8" opacity="0.6"/>
          <path d="M8 17L12 18" stroke="#a88848" stroke-width="0.8" opacity="0.5"/>
        </g>
      </svg>
      <span class="sub-text" style="color:rgba(220,190,140,0.92)">좋아요</span>
    </div>
    <div class="sub-divider" style="background:rgba(170,140,80,0.23);width:1px;height:22px;"></div>
    <div class="sub-anim sub-item">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <g class="bk6tqf4" style="opacity:0">
          <path d="M14 4C14 4 8 7 8 14L8 19L6 21H22L20 19L20 14C20 7 14 4 14 4Z" stroke="#b89858" stroke-width="1.5" fill="rgba(184,152,88,0.1)"/>
          <path d="M11 21C11 22.66 12.34 24 14 24S17 22.66 17 21" stroke="#b89858" stroke-width="1.3" fill="none"/>
          <circle cx="14" cy="5" r="1.5" fill="#b89858"/>
        </g>
      </svg>
      <span class="sub-text" style="color:rgba(220,190,140,0.92)">구독</span>
    </div>
      </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="bar-gradient"></div>
      <div class="bar-topline"></div>
      <div class="bar-inner">
        <div class="disk-wrap">
          <div class="disk"></div>
          <div class="disk-center"></div>
          <div class="disk-icon">📖</div>
        </div>
        <div class="eq-wrap" id="eqWrap"></div>
        <div class="bar-copy">
          <div class="bar-line bar-lyric" data-preview-lyric>먼지 쌓인 책장 사이 너의 흔적</div>
          <div class="bar-line bar-song" data-preview-title data-preview-title-fallback style="display:none;">오래된 책방</div>
        </div>
        <div class="bar-logo">
          <div class="bar-logo-name">POP WiFi</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
