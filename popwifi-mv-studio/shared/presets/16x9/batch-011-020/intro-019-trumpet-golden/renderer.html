<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>19 · 트럼펫 골든</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
  <div class="mv-wrap" id="mv">
    <div class="bg"></div>
    <div class="particles" id="particles"></div>
    <div class="frame-layer" id="frameLayer">
      <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
    </div>

    <div class="title-layer">
      <div class="title-main" id="titleMain" data-preview-title>Golden Hour</div>
    </div>

    <div class="sub-layer" id="subLayer">
      <div class="sub-card">
        <style>
    .sub-anim.active .tp65j22{animation:tpBell65j22 0.8s cubic-bezier(0.34,1.5,0.64,1) forwards;}
    @keyframes tpBell65j22{0%{transform:scale(0) rotate(20deg);}70%{transform:scale(1.15) rotate(-3deg);}100%{transform:scale(1) rotate(0deg);}}</style>
    <div class="sub-anim sub-item">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <g class="tp65j22" style="transform-origin:14px 14px;transform:scale(0)">
          <path d="M3,14 L8,14 L10,10 L10,18 L12,10 L12,18 L14,12 L14,16 L20,14 Q24,10 26,14 Q28,18 24,20 Q20,22 14,20" stroke="#e8b820" stroke-width="1.8" fill="none" stroke-linecap="round"/>
          <circle cx="26" cy="14" r="4" stroke="#e8b820" stroke-width="1.2" fill="rgba(232,184,32,0.15)"/>
        </g>
      </svg>
      <span class="sub-text" style="color:rgba(250,220,140,0.92)">좋아요</span>
    </div>
    <div class="sub-divider" style="background:rgba(230,190,40,0.26);width:1px;height:22px;"></div>
    <div class="sub-anim sub-item">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <g class="tp65j22" style="transform-origin:14px 14px;transform:scale(0)">
          <path d="M14 4C14 4 8 7 8 14L8 19L6 21H22L20 19L20 14C20 7 14 4 14 4Z" stroke="#f0c830" stroke-width="1.6" fill="rgba(240,200,48,0.1)"/>
          <path d="M11 21C11 22.66 12.34 24 14 24S17 22.66 17 21" stroke="#f0c830" stroke-width="1.4" fill="none"/>
          <circle cx="14" cy="5" r="1.5" fill="#f0c830"/>
        </g>
      </svg>
      <span class="sub-text" style="color:rgba(250,220,140,0.92)">구독</span>
    </div>
      </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="bar-gradient"></div>
      <div class="bar-topline"></div>
      <div class="bar-inner">
        <div class="disk-wrap">
          <div class="disk"></div>
          <div class="disk-center"></div>
          <div class="disk-icon">🎺</div>
        </div>
        <div class="eq-wrap" id="eqWrap"></div>
        <div class="bar-copy">
          <div class="bar-line bar-lyric" data-preview-lyric>황금빛 노을 속 울려 퍼진 트럼펫</div>
          <div class="bar-line bar-song" data-preview-title data-preview-title-fallback style="display:none;">Golden Hour</div>
        </div>
        <div class="bar-logo">
          <div class="bar-logo-name">POP WiFi</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
