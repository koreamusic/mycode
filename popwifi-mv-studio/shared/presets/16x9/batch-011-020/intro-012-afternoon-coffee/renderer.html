<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>12 · 오후의 커피</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
  <div class="mv-wrap" id="mv">
    <div class="bg"></div>
    <div class="particles" id="particles"></div>
    <div class="frame-layer" id="frameLayer">
      <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
    </div>

    <div class="title-layer">
      <div class="title-main" id="titleMain" data-preview-title>커피 한 잔</div>
    </div>

    <div class="sub-layer" id="subLayer">
      <div class="sub-card">
        <style>
    .sub-anim.active .cfitbox{animation:cfRiseitbox 0.7s ease forwards;}
    @keyframes cfRiseitbox{0%{transform:translateY(15px);opacity:0;}100%{transform:translateY(0);opacity:1;}}
    .sub-anim.active .smitbox{animation:smWaftitbox 2s ease-in-out infinite;}
    @keyframes smWaftitbox{0%,100%{transform:translateY(0) scaleX(1);}50%{transform:translateY(-6px) scaleX(0.7);}}</style>
    <div class="sub-anim sub-item">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <g class="cfitbox" style="opacity:0">
          <path d="M6,14 L9,24 L19,24 L22,14 Z" stroke="#b87840" stroke-width="1.3" fill="rgba(184,120,64,0.12)"/>
          <ellipse cx="14" cy="14" rx="8" ry="3" stroke="#b87840" stroke-width="1" fill="none"/>
          <path class="smitbox" d="M10,10 Q11,7 10,4" stroke="#b87840" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.7"/>
          <path class="smitbox" d="M14,10 Q15,6 14,3" stroke="#b87840" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.7" style="animation-delay:0.3s"/>
          <path class="smitbox" d="M18,10 Q19,7 18,4" stroke="#b87840" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.7" style="animation-delay:0.6s"/>
        </g>
      </svg>
      <span class="sub-text" style="color:rgba(230,185,130,0.92)">좋아요</span>
    </div>
    <div class="sub-divider" style="background:rgba(180,120,60,0.25);width:1px;height:22px;"></div>
    <div class="sub-anim sub-item">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <g class="cfitbox" style="opacity:0">
          <path d="M14 4C14 4 8 7 8 14L8 19L6 21H22L20 19L20 14C20 7 14 4 14 4Z" stroke="#c88850" stroke-width="1.6" fill="rgba(200,136,80,0.1)"/>
          <path d="M11 21C11 22.66 12.34 24 14 24S17 22.66 17 21" stroke="#c88850" stroke-width="1.4" fill="none"/>
          <circle cx="14" cy="5" r="1.5" fill="#c88850"/>
        </g>
      </svg>
      <span class="sub-text" style="color:rgba(230,185,130,0.92)">구독</span>
    </div>
      </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="bar-gradient"></div>
      <div class="bar-topline"></div>
      <div class="bar-inner">
        <div class="disk-wrap">
          <div class="disk"></div>
          <div class="disk-center"></div>
          <div class="disk-icon">☕</div>
        </div>
        <div class="eq-wrap" id="eqWrap"></div>
        <div class="bar-copy">
          <div class="bar-line bar-lyric" data-preview-lyric>따뜻한 커피 한 잔처럼 네 온기</div>
          <div class="bar-line bar-song" data-preview-title data-preview-title-fallback style="display:none;">커피 한 잔</div>
        </div>
        <div class="bar-logo">
          <div class="bar-logo-name">POP WiFi</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
