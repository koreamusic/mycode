<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>15 · 고양이 오후</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
  <div class="mv-wrap" id="mv">
    <div class="bg"></div>
    <div class="particles" id="particles"></div>
    <div class="frame-layer" id="frameLayer">
      <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
    </div>

    <div class="title-layer">
      <div class="title-main" id="titleMain" data-preview-title>냥이의 오후</div>
    </div>

    <div class="sub-layer" id="subLayer">
      <div class="sub-card">
        <style>
    .sub-anim.active .ctucbxx{animation:ctBounceucbxx 0.7s cubic-bezier(0.34,1.6,0.64,1) forwards;}
    @keyframes ctBounceucbxx{0%{transform:scale(0);}70%{transform:scale(1.2);}100%{transform:scale(1);}}
    .sub-anim.active .twucbxx{animation:twWagucbxx 0.6s ease-in-out infinite alternate;}
    @keyframes twWagucbxx{0%{transform:rotate(-30deg);}100%{transform:rotate(30deg);}}</style>
    <div class="sub-anim sub-item">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <g class="ctucbxx" style="transform-origin:14px 14px;transform:scale(0)">
          <circle cx="14" cy="15" r="9" stroke="#d4a848" stroke-width="1.3" fill="rgba(212,168,72,0.1)"/>
          <path d="M8,8 L5,2 L10,7Z" fill="#d4a848" opacity="0.75"/>
          <path d="M20,8 L23,2 L18,7Z" fill="#d4a848" opacity="0.75"/>
          <ellipse cx="11" cy="15" rx="3" ry="4" fill="rgba(212,168,72,0.55)"/>
          <ellipse cx="17" cy="15" rx="3" ry="4" fill="rgba(212,168,72,0.55)"/>
          <path d="M14,18 Q11,21 8,20" stroke="#d4a848" stroke-width="0.8" fill="none" opacity="0.6"/>
          <path d="M14,18 Q17,21 20,20" stroke="#d4a848" stroke-width="0.8" fill="none" opacity="0.6"/>
        </g>
      </svg>
      <span class="sub-text" style="color:rgba(240,200,130,0.92)">좋아요</span>
    </div>
    <div class="sub-divider" style="background:rgba(210,170,80,0.24);width:1px;height:22px;"></div>
    <div class="sub-anim sub-item">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <g class="ctucbxx" style="transform-origin:14px 14px;transform:scale(0)">
          <path d="M14 4C14 4 8 7 8 14L8 19L6 21H22L20 19L20 14C20 7 14 4 14 4Z" stroke="#e0b858" stroke-width="1.5" fill="rgba(224,184,88,0.1)"/>
          <path class="twucbxx" d="M14,21 Q18,22 22,20 Q24,18 20,18" stroke="#e0b858" stroke-width="1" fill="none" style="transform-origin:14px 21px"/>
          <path d="M11 21C11 22.66 12.34 24 14 24S17 22.66 17 21" stroke="#e0b858" stroke-width="1.3" fill="none"/>
          <circle cx="14" cy="5" r="1.5" fill="#e0b858"/>
        </g>
      </svg>
      <span class="sub-text" style="color:rgba(240,200,130,0.92)">구독</span>
    </div>
      </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="bar-gradient"></div>
      <div class="bar-topline"></div>
      <div class="bar-inner">
        <div class="disk-wrap">
          <div class="disk"></div>
          <div class="disk-center"></div>
          <div class="disk-icon">🐾</div>
        </div>
        <div class="eq-wrap" id="eqWrap"></div>
        <div class="bar-copy">
          <div class="bar-line bar-lyric" data-preview-lyric>햇살 속에 졸고 있는 너의 곁</div>
          <div class="bar-line bar-song" data-preview-title data-preview-title-fallback style="display:none;">냥이의 오후</div>
        </div>
        <div class="bar-logo">
          <div class="bar-logo-name">POP WiFi</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
