<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>16 · 식물 창가</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
  <div class="mv-wrap" id="mv">
    <div class="bg"></div>
    <div class="particles" id="particles"></div>
    <div class="frame-layer" id="frameLayer">
      <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
    </div>

    <div class="title-layer">
      <div class="title-main" id="titleMain" data-preview-title>초록의 오후</div>
    </div>

    <div class="sub-layer" id="subLayer">
      <div class="sub-card">
        <style>
    .sub-anim.active .plbzyh2{animation:plGrowbzyh2 1s cubic-bezier(0.34,1.2,0.64,1) forwards;}
    @keyframes plGrowbzyh2{0%{transform:scaleY(0);transform-origin:bottom;}100%{transform:scaleY(1);}}</style>
    <div class="sub-anim sub-item">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <g class="plbzyh2" style="transform-origin:14px 26px">
          <line x1="14" y1="26" x2="14" y2="10" stroke="#60a868" stroke-width="1.5"/>
          <ellipse cx="14" cy="14" rx="8" ry="5" fill="rgba(96,168,104,0.35)" stroke="#60a868" stroke-width="1" transform="rotate(-25,14,14)"/>
          <ellipse cx="14" cy="10" rx="6" ry="4" fill="rgba(96,168,104,0.4)" stroke="#60a868" stroke-width="1" transform="rotate(25,14,10)"/>
        </g>
      </svg>
      <span class="sub-text" style="color:rgba(150,210,155,0.92)">좋아요</span>
    </div>
    <div class="sub-divider" style="background:rgba(80,160,90,0.22);width:1px;height:22px;"></div>
    <div class="sub-anim sub-item">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <g class="plbzyh2" style="transform-origin:14px 26px">
          <path d="M14 4C14 4 8 7 8 14L8 19L6 21H22L20 19L20 14C20 7 14 4 14 4Z" stroke="#70b878" stroke-width="1.5" fill="rgba(112,184,120,0.1)"/>
          <path d="M11 21C11 22.66 12.34 24 14 24S17 22.66 17 21" stroke="#70b878" stroke-width="1.3" fill="none"/>
          <circle cx="14" cy="5" r="1.5" fill="#70b878"/>
        </g>
      </svg>
      <span class="sub-text" style="color:rgba(150,210,155,0.92)">구독</span>
    </div>
      </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="bar-gradient"></div>
      <div class="bar-topline"></div>
      <div class="bar-inner">
        <div class="disk-wrap">
          <div class="disk"></div>
          <div class="disk-center"></div>
          <div class="disk-icon">🍃</div>
        </div>
        <div class="eq-wrap" id="eqWrap"></div>
        <div class="bar-copy">
          <div class="bar-line bar-lyric" data-preview-lyric>창가에 기대어 바라본 하늘</div>
          <div class="bar-line bar-song" data-preview-title data-preview-title-fallback style="display:none;">초록의 오후</div>
        </div>
        <div class="bar-logo">
          <div class="bar-logo-name">POP WiFi</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
