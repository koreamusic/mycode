<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>20 · 빈티지 재즈 클럽</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
  <div class="mv-wrap" id="mv">
    <div class="bg"></div>
    <div class="particles" id="particles"></div>
    <div class="frame-layer" id="frameLayer">
      <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
    </div>

    <div class="title-layer">
      <div class="title-main" id="titleMain" data-preview-title>Blue Midnight</div>
    </div>

    <div class="sub-layer" id="subLayer">
      <div class="sub-card">
        <style>
    .sub-anim.active .vj0t90v{animation:vjSlide0t90v 0.6s cubic-bezier(0.34,1.3,0.64,1) forwards;}
    @keyframes vjSlide0t90v{0%{transform:translateX(-20px);opacity:0;}100%{transform:translateX(0);opacity:1;}}</style>
    <div class="sub-anim sub-item">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <g class="vj0t90v" style="opacity:0">
          <path d="M14 5L17 11H24L18.5 15.5L20.5 22L14 18L7.5 22L9.5 15.5L4 11H11Z" stroke="#6878d0" stroke-width="1.3" fill="rgba(104,120,208,0.18)"/>
        </g>
      </svg>
      <span class="sub-text" style="color:rgba(185,195,248,0.92)">좋아요</span>
    </div>
    <div class="sub-divider" style="background:rgba(100,120,210,0.23);width:1px;height:22px;"></div>
    <div class="sub-anim sub-item">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <g class="vj0t90v" style="opacity:0">
          <path d="M14 4C14 4 8 7 8 14L8 19L6 21H22L20 19L20 14C20 7 14 4 14 4Z" stroke="#7888e0" stroke-width="1.6" fill="rgba(120,136,224,0.1)"/>
          <path d="M11 21C11 22.66 12.34 24 14 24S17 22.66 17 21" stroke="#7888e0" stroke-width="1.4" fill="none"/>
          <circle cx="14" cy="5" r="1.5" fill="#7888e0"/>
        </g>
      </svg>
      <span class="sub-text" style="color:rgba(185,195,248,0.92)">구독</span>
    </div>
      </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="bar-gradient"></div>
      <div class="bar-topline"></div>
      <div class="bar-inner">
        <div class="disk-wrap">
          <div class="disk"></div>
          <div class="disk-center"></div>
          <div class="disk-icon">🪗</div>
        </div>
        <div class="eq-wrap" id="eqWrap"></div>
        <div class="bar-copy">
          <div class="bar-line bar-lyric" data-preview-lyric>파란 자정의 재즈</div>
          <div class="bar-line bar-song" data-preview-title data-preview-title-fallback style="display:none;">Blue Midnight</div>
        </div>
        <div class="bar-logo">
          <div class="bar-logo-name">POP WiFi</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
