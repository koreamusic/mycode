<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>11 · 빈티지 카세트</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
  <div class="mv-wrap" id="mv">
    <div class="bg"></div>
    <div class="particles" id="particles"></div>
    <div class="frame-layer" id="frameLayer">
      <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
    </div>

    <div class="title-layer">
      <div class="title-main" id="titleMain" data-preview-title>오래된 테이프</div>
    </div>

    <div class="sub-layer" id="subLayer">
      <div class="sub-card">
        <style>
    .sub-anim.active .cs3qyzg{animation:csSlide3qyzg 0.7s cubic-bezier(0.34,1.3,0.64,1) forwards;}
    @keyframes csSlide3qyzg{0%{transform:translateY(20px);opacity:0;}100%{transform:translateY(0);opacity:1;}}
    .sub-anim.active .cr3qyzg{animation:crSpin3qyzg 1.2s linear infinite;}
    @keyframes crSpin3qyzg{to{transform:rotate(360deg);}}</style>
    <div class="sub-anim sub-item">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <g class="cs3qyzg" style="opacity:0">
          <rect x="4" y="8" width="20" height="14" rx="2.5" stroke="#c8a858" stroke-width="1.4" fill="rgba(200,168,88,0.1)"/>
          <circle cx="10" cy="17" r="3.5" stroke="#c8a858" stroke-width="1.1" fill="none"/>
          <circle cx="18" cy="17" r="3.5" stroke="#c8a858" stroke-width="1.1" fill="none"/>
          <line x1="13.5" y1="17" x2="14.5" y2="17" stroke="#c8a858" stroke-width="1.5"/>
        </g>
      </svg>
      <span class="sub-text" style="color:rgba(235,200,135,0.92)">좋아요</span>
    </div>
    <div class="sub-divider" style="background:rgba(200,160,80,0.25);width:1px;height:22px;"></div>
    <div class="sub-anim sub-item">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <g class="cs3qyzg" style="opacity:0">
          <circle cx="14" cy="14" r="10" stroke="#d4b46a" stroke-width="1.4" fill="rgba(212,180,106,0.08)"/>
          <circle class="cr3qyzg" cx="14" cy="14" r="5" stroke="#d4b46a" stroke-width="1.1" fill="none" style="transform-origin:14px 14px"/>
          <circle cx="14" cy="14" r="2" fill="#d4b46a" opacity="0.8"/>
        </g>
      </svg>
      <span class="sub-text" style="color:rgba(235,200,135,0.92)">구독</span>
    </div>
      </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="bar-gradient"></div>
      <div class="bar-topline"></div>
      <div class="bar-inner">
        <div class="disk-wrap">
          <div class="disk"></div>
          <div class="disk-center"></div>
          <div class="disk-icon">📼</div>
        </div>
        <div class="eq-wrap" id="eqWrap"></div>
        <div class="bar-copy">
          <div class="bar-line bar-lyric" data-preview-lyric>늘어진 테이프처럼 흐릿한 기억</div>
          <div class="bar-line bar-song" data-preview-title data-preview-title-fallback style="display:none;">오래된 테이프</div>
        </div>
        <div class="bar-logo">
          <div class="bar-logo-name">POP WiFi</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
