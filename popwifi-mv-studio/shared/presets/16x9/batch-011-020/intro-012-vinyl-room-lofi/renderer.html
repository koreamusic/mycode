<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>12 - Afternoon Coffee — Source Faithful Renderer</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
<div class="mv-wrap" id="mv">
  <div class="bg"></div>
  <div class="particles" id="particles"></div>
  <div class="frame-layer" id="frameLayer"><svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg></div>
  <div class="title-layer">
    <div class="title-main" id="titleMain">Afternoon Brew</div>
    <div class="title-row" id="titleRow"><div class="title-line"></div><div class="title-sub">POP WiFi · 팝 와이파이</div><div class="title-line"></div></div>
  </div>
  <div class="sub-layer" id="subLayer">
    <div class="sub-card">
      <div class="sub-item">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><path id="heartPath" class="heart-path" d="M14 23 C14 23 4 16 4 10 C4 7 6.5 4.5 9.5 4.5 C11.5 4.5 13 5.5 14 7 C15 5.5 16.5 4.5 18.5 4.5 C21.5 4.5 24 7 24 10 C24 16 14 23 14 23Z" stroke-width="1.8" fill-opacity="0.15" stroke-linejoin="round"/></svg>
        <span class="sub-text">좋아요</span>
      </div>
      <div class="sub-divider"></div>
      <div class="sub-item">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g id="bellG" class="bell-g"><path d="M14 4.5 C14 4.5 9 6.5 9 13 L9 18 L7 20.5 L21 20.5 L19 18 L19 13 C19 6.5 14 4.5 14 4.5Z" stroke-width="1.6" fill-opacity="0.1" stroke-linejoin="round"/><path d="M11.5 20.5 C11.5 22 12.6 23 14 23 C15.4 23 16.5 22 16.5 20.5" stroke-width="1.5" fill="none"/><circle cx="14" cy="5.5" r="1.4" opacity="0.8"/></g></svg>
        <span class="sub-text">구독 · 알림</span>
      </div>
    </div>
  </div>
  <div class="bottom-bar" id="bottomBar">
    <div class="bar-gradient"></div><div class="bar-topline"></div>
    <div class="bar-inner">
      <div class="disk-wrap"><div class="disk"></div><div class="disk-center"></div><div class="disk-icon">☕</div></div>
      <div class="eq-wrap" id="eqWrap"></div>
      <div class="bar-text"><div class="bar-song">Afternoon Brew</div><div class="bar-lyric">따뜻한 커피 한 잔처럼 스며드는 오후</div></div>
      <div class="bar-logo"><div class="bar-logo-name">POP WiFi</div><div class="bar-logo-sub">팝 와이파이</div></div>
    </div>
  </div>
</div>
<script src="./renderer.js"></script>
</body>
</html>
