<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>17 · 밤의 라디오</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
  <div class="mv-wrap" id="mv">
    <div class="bg"></div>
    <div class="particles" id="particles"></div>
    <div class="frame-layer" id="frameLayer">
      <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
    </div>

    <div class="title-layer">
      <div class="title-main" id="titleMain" data-preview-title>심야 라디오</div>
    </div>

    <div class="sub-layer" id="subLayer">
      <div class="sub-card">
        <style>
    .sub-anim.active .rdscilk{animation:rdWavescilk 0.6s ease forwards;}
    @keyframes rdWavescilk{0%{transform:scale(0);opacity:0;}60%{transform:scale(1.15);}100%{transform:scale(1);opacity:1;}}
    .sub-anim.active .rwscilk{animation:rwPulsescilk 1.2s ease-in-out infinite;}
    @keyframes rwPulsescilk{0%,100%{opacity:0.3;}50%{opacity:0.9;}}</style>
    <div class="sub-anim sub-item">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <g class="rdscilk" style="transform-origin:14px 14px;transform:scale(0);opacity:0">
          <path class="rwscilk" d="M14,14 m-10,0 a10,10 0 0,1 20,0 a10,10 0 0,1 -20,0" stroke="#a880e0" stroke-width="1.2" fill="none" opacity="0.4" style="animation-delay:0s"/><path class="rwscilk" d="M14,14 m-7,0 a7,7 0 0,1 14,0 a7,7 0 0,1 -14,0" stroke="#a880e0" stroke-width="1.2" fill="none" opacity="0.6000000000000001" style="animation-delay:0.2s"/><path class="rwscilk" d="M14,14 m-4,0 a4,4 0 0,1 8,0 a4,4 0 0,1 -8,0" stroke="#a880e0" stroke-width="1.2" fill="none" opacity="0.8" style="animation-delay:0.4s"/>
          <circle cx="14" cy="14" r="2" fill="#a880e0"/>
        </g>
      </svg>
      <span class="sub-text" style="color:rgba(210,185,250,0.92)">좋아요</span>
    </div>
    <div class="sub-divider" style="background:rgba(160,120,220,0.23);width:1px;height:22px;"></div>
    <div class="sub-anim sub-item">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <g class="rdscilk" style="transform-origin:14px 14px;transform:scale(0);opacity:0">
          <path d="M14 4C14 4 8 7 8 14L8 19L6 21H22L20 19L20 14C20 7 14 4 14 4Z" stroke="#b890f0" stroke-width="1.5" fill="rgba(184,144,240,0.1)"/>
          <path d="M11 21C11 22.66 12.34 24 14 24S17 22.66 17 21" stroke="#b890f0" stroke-width="1.3" fill="none"/>
          <circle cx="14" cy="5" r="1.5" fill="#b890f0"/>
        </g>
      </svg>
      <span class="sub-text" style="color:rgba(210,185,250,0.92)">구독</span>
    </div>
      </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="bar-gradient"></div>
      <div class="bar-topline"></div>
      <div class="bar-inner">
        <div class="disk-wrap">
          <div class="disk"></div>
          <div class="disk-center"></div>
          <div class="disk-icon">📻</div>
        </div>
        <div class="eq-wrap" id="eqWrap"></div>
        <div class="bar-copy">
          <div class="bar-line bar-lyric" data-preview-lyric>밤을 달리는 주파수 위의 노래</div>
          <div class="bar-line bar-song" data-preview-title data-preview-title-fallback style="display:none;">심야 라디오</div>
        </div>
        <div class="bar-logo">
          <div class="bar-logo-name">POP WiFi</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
