<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>18 · 스모키 재즈 바</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
  <div class="mv-wrap" id="mv">
    <div class="bg"></div>
    <div class="particles" id="particles"></div>
    <div class="frame-layer" id="frameLayer">
      <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
    </div>

    <div class="title-layer">
      <div class="title-main" id="titleMain" data-preview-title>Smoky Night</div>
    </div>

    <div class="sub-layer" id="subLayer">
      <div class="sub-card">
        <style>
    .sub-anim.active .jznel6a{animation:jzSwingnel6a 0.7s cubic-bezier(0.34,1.4,0.64,1) forwards;}
    @keyframes jzSwingnel6a{0%{transform:rotate(-20deg) scale(0);opacity:0;}60%{transform:rotate(5deg) scale(1.1);}100%{transform:rotate(0deg) scale(1);opacity:1;}}</style>
    <div class="sub-anim sub-item">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <g class="jznel6a" style="transform-origin:14px 14px;opacity:0">
          <path d="M16,2 Q18,2 18,6 L18,18 Q18,22 14,24 Q10,26 8,22 Q6,20 8,17 Q10,15 14,15 Q16,15 17,17" stroke="#d48830" stroke-width="2" fill="none" stroke-linecap="round"/>
          <circle cx="16" cy="2" r="3" stroke="#d48830" stroke-width="1.2" fill="rgba(212,136,48,0.2)"/>
        </g>
      </svg>
      <span class="sub-text" style="color:rgba(240,195,130,0.92)">좋아요</span>
    </div>
    <div class="sub-divider" style="background:rgba(210,140,50,0.25);width:1px;height:22px;"></div>
    <div class="sub-anim sub-item">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <g class="jznel6a" style="transform-origin:14px 14px;opacity:0">
          <path d="M14 4C14 4 8 7 8 14L8 19L6 21H22L20 19L20 14C20 7 14 4 14 4Z" stroke="#e09840" stroke-width="1.6" fill="rgba(224,152,64,0.1)"/>
          <path d="M11 21C11 22.66 12.34 24 14 24S17 22.66 17 21" stroke="#e09840" stroke-width="1.4" fill="none"/>
          <circle cx="14" cy="5" r="1.5" fill="#e09840"/>
        </g>
      </svg>
      <span class="sub-text" style="color:rgba(240,195,130,0.92)">구독</span>
    </div>
      </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="bar-gradient"></div>
      <div class="bar-topline"></div>
      <div class="bar-inner">
        <div class="disk-wrap">
          <div class="disk"></div>
          <div class="disk-center"></div>
          <div class="disk-icon">🎷</div>
        </div>
        <div class="eq-wrap" id="eqWrap"></div>
        <div class="bar-copy">
          <div class="bar-line bar-lyric" data-preview-lyric>담배 연기 자욱한 그 밤의 무대</div>
          <div class="bar-line bar-song" data-preview-title data-preview-title-fallback style="display:none;">Smoky Night</div>
        </div>
        <div class="bar-logo">
          <div class="bar-logo-name">POP WiFi</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
