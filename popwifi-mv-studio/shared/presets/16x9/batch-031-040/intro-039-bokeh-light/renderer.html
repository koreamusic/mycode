<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>39 · 빛 번짐 보케</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
  <div class="mv-wrap" id="mv">
    <div class="bg"></div>
    <div class="particles" id="particles"></div>
    <div class="frame-layer" id="frameLayer">
      <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
    </div>

    <div class="title-layer">
      <div class="title-main" id="titleMain" data-preview-title>Bokeh Light</div>
    </div>

    <div class="sub-layer" id="subLayer">
      <div class="sub-card">
        <style>.sub-anim.active .bk4gf3o{animation:bkGlow4gf3o 0.6s ease forwards;}@keyframes bkGlow4gf3o{0%{transform:scale(0);filter:blur(12px);opacity:0;}60%{filter:blur(3px);}100%{transform:scale(1);filter:blur(0);opacity:1;}}</style><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="bk4gf3o" style="opacity:0"><circle cx="14" cy="14" r="10" fill="rgba(240,192,64,0.2)" filter="url(#bk_glow)"/><path d="M14 22C14 22 4 15 4 9C4 6 6.5 4 9.5 4C11.5 4 13 5 14 7C15 5 16.5 4 18.5 4C21.5 4 24 6 24 9C24 15 14 22 14 22Z" stroke="#f0c040" stroke-width="1.8" fill="rgba(240,192,64,0.2)"/></g></svg><span class="sub-text" style="color:rgba(255,235,170,0.92)">좋아요</span></div><div class="sub-divider" style="background:rgba(240,200,70,0.28);width:1px;height:22px;"></div><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="bk4gf3o" style="opacity:0"><path d="M14 4C14 4 8 7 8 14L8 19L6 21H22L20 19L20 14C20 7 14 4 14 4Z" stroke="#f8d050" stroke-width="1.6" fill="rgba(248,208,80,0.12)"/><path d="M11 21C11 22.66 12.34 24 14 24S17 22.66 17 21" stroke="#f8d050" stroke-width="1.4" fill="none"/><circle cx="14" cy="5" r="1.5" fill="#f8d050"/></g></svg><span class="sub-text" style="color:rgba(255,235,170,0.92)">구독</span></div>
      </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="bar-gradient"></div>
      <div class="bar-topline"></div>
      <div class="bar-inner">
        <div class="disk-wrap">
          <div class="disk"></div>
          <div class="disk-center"></div>
          <div class="disk-icon">💡</div>
        </div>
        <div class="eq-wrap" id="eqWrap"></div>
        <div class="bar-copy">
          <div class="bar-line bar-lyric" data-preview-lyric>빛이 번지듯 흐릿한 설렘</div>
          <div class="bar-line bar-song" data-preview-title data-preview-title-fallback style="display:none;">Bokeh Light</div>
        </div>
        <div class="bar-logo">
          <div class="bar-logo-name">POP WiFi</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
