<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>31 · 수채화 번짐</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
  <div class="mv-wrap" id="mv">
    <div class="bg"></div>
    <div class="particles" id="particles"></div>
    <div class="frame-layer" id="frameLayer">
      <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
    </div>

    <div class="title-layer">
      <div class="title-main" id="titleMain" data-preview-title>수채화 빗속에</div>
    </div>

    <div class="sub-layer" id="subLayer">
      <div class="sub-card">
        <style>.sub-anim.active .wcgxqa9{animation:wcSgxqa9 1s ease forwards;}@keyframes wcSgxqa9{0%{transform:scale(0);filter:blur(8px);opacity:0;}70%{filter:blur(2px);}100%{transform:scale(1);filter:blur(0);opacity:1;}}</style><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="wcgxqa9" style="transform-origin:14px 14px;opacity:0"><path d="M14 22C14 22 4 15 4 9C4 6 6.5 4 9.5 4C11.5 4 13 5 14 7C15 5 16.5 4 18.5 4C21.5 4 24 6 24 9C24 15 14 22 14 22Z" stroke="#7898d0" stroke-width="1.8" fill="rgba(120,152,208,0.18)"/></g></svg><span class="sub-text" style="color:rgba(180,210,248,0.92)">좋아요</span></div><div class="sub-divider" style="background:rgba(110,160,220,0.24);width:1px;height:22px;"></div><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="wcgxqa9" style="transform-origin:14px 14px;opacity:0"><path d="M14 4C14 4 8 7 8 14L8 19L6 21H22L20 19L20 14C20 7 14 4 14 4Z" stroke="#88a8e0" stroke-width="1.6" fill="rgba(136,168,224,0.12)"/><path d="M11 21C11 22.66 12.34 24 14 24S17 22.66 17 21" stroke="#88a8e0" stroke-width="1.4" fill="none"/><circle cx="14" cy="5" r="1.5" fill="#88a8e0"/></g></svg><span class="sub-text" style="color:rgba(180,210,248,0.92)">구독</span></div>
      </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="bar-gradient"></div>
      <div class="bar-topline"></div>
      <div class="bar-inner">
        <div class="disk-wrap">
          <div class="disk"></div>
          <div class="disk-center"></div>
          <div class="disk-icon">🖌️</div>
        </div>
        <div class="eq-wrap" id="eqWrap"></div>
        <div class="bar-copy">
          <div class="bar-line bar-lyric" data-preview-lyric>번지는 색처럼 퍼져가는 그리움</div>
          <div class="bar-line bar-song" data-preview-title data-preview-title-fallback style="display:none;">수채화 빗속에</div>
        </div>
        <div class="bar-logo">
          <div class="bar-logo-name">POP WiFi</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
