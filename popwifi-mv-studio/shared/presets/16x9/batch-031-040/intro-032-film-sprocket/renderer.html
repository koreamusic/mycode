<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>32 · 필름 스프라켓</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
  <div class="mv-wrap" id="mv">
    <div class="bg"></div>
    <div class="particles" id="particles"></div>
    <div class="frame-layer" id="frameLayer">
      <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
    </div>

    <div class="title-layer">
      <div class="title-main" id="titleMain" data-preview-title>오래된 필름</div>
    </div>

    <div class="sub-layer" id="subLayer">
      <div class="sub-card">
        <style>.sub-anim.active .fmmvplc{animation:fmSlidemvplc 0.7s cubic-bezier(0.34,1.2,0.64,1) forwards;}@keyframes fmSlidemvplc{0%{transform:translateX(-25px);opacity:0;}100%{transform:translateX(0);opacity:1;}}</style><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="fmmvplc" style="opacity:0"><rect x="3" y="6" width="22" height="16" rx="1.5" stroke="#b8982e" stroke-width="1.3" fill="rgba(184,152,46,0.1)"/><rect x="8" y="4" width="3" height="4" rx="1" fill="#b8982e" opacity="0.6"/><rect x="16" y="4" width="3" height="4" rx="1" fill="#b8982e" opacity="0.6"/><rect x="22" y="4" width="3" height="4" rx="1" fill="#b8982e" opacity="0.6"/><rect x="8" y="20" width="3" height="4" rx="1" fill="#b8982e" opacity="0.6"/><rect x="16" y="20" width="3" height="4" rx="1" fill="#b8982e" opacity="0.6"/><rect x="22" y="20" width="3" height="4" rx="1" fill="#b8982e" opacity="0.6"/><circle cx="14" cy="14" r="4" stroke="#c8a83e" stroke-width="0.8" fill="none"/></g></svg><span class="sub-text" style="color:rgba(228,200,138,0.92)">좋아요</span></div><div class="sub-divider" style="background:rgba(180,150,50,0.22);width:1px;height:22px;"></div><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="fmmvplc" style="opacity:0"><path d="M14 4C14 4 8 7 8 14L8 19L6 21H22L20 19L20 14C20 7 14 4 14 4Z" stroke="#c8a83e" stroke-width="1.5" fill="rgba(200,168,62,0.1)"/><path d="M11 21C11 22.66 12.34 24 14 24S17 22.66 17 21" stroke="#c8a83e" stroke-width="1.3" fill="none"/><circle cx="14" cy="5" r="1.5" fill="#c8a83e"/></g></svg><span class="sub-text" style="color:rgba(228,200,138,0.92)">구독</span></div>
      </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="bar-gradient"></div>
      <div class="bar-topline"></div>
      <div class="bar-inner">
        <div class="disk-wrap">
          <div class="disk"></div>
          <div class="disk-center"></div>
          <div class="disk-icon">🎬</div>
        </div>
        <div class="eq-wrap" id="eqWrap"></div>
        <div class="bar-copy">
          <div class="bar-line bar-lyric" data-preview-lyric>색이 바랜 필름 속 우리의 기억</div>
          <div class="bar-line bar-song" data-preview-title data-preview-title-fallback style="display:none;">오래된 필름</div>
        </div>
        <div class="bar-logo">
          <div class="bar-logo-name">POP WiFi</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
