<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>35 · 레이스 장식</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
  <div class="mv-wrap" id="mv">
    <div class="bg"></div>
    <div class="particles" id="particles"></div>
    <div class="frame-layer" id="frameLayer">
      <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
    </div>

    <div class="title-layer">
      <div class="title-main" id="titleMain" data-preview-title>하얀 드레스</div>
    </div>

    <div class="sub-layer" id="subLayer">
      <div class="sub-card">
        <style>.sub-anim.active .lcxh816{animation:lcBloomxh816 0.9s ease forwards;}@keyframes lcBloomxh816{0%{transform:scale(0);opacity:0;}60%{transform:scale(1.1);}100%{transform:scale(1);opacity:1;}}</style><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="lcxh816" style="transform-origin:14px 14px;opacity:0"><ellipse cx="14" cy="14" rx="7" ry="3" fill="rgba(208,192,224,0.38)" stroke="#d0c0e0" stroke-width="0.7" transform="rotate(0,14,14)"/><ellipse cx="14" cy="14" rx="7" ry="3" fill="rgba(208,192,224,0.38)" stroke="#d0c0e0" stroke-width="0.7" transform="rotate(45,14,14)"/><ellipse cx="14" cy="14" rx="7" ry="3" fill="rgba(208,192,224,0.38)" stroke="#d0c0e0" stroke-width="0.7" transform="rotate(90,14,14)"/><ellipse cx="14" cy="14" rx="7" ry="3" fill="rgba(208,192,224,0.38)" stroke="#d0c0e0" stroke-width="0.7" transform="rotate(135,14,14)"/><circle cx="14" cy="14" r="2.5" fill="rgba(208,192,224,0.65)"/></g></svg><span class="sub-text" style="color:rgba(232,220,248,0.92)">좋아요</span></div><div class="sub-divider" style="background:rgba(210,195,228,0.20);width:1px;height:22px;"></div><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="lcxh816" style="transform-origin:14px 14px;opacity:0"><path d="M14 4C14 4 8 7 8 14L8 19L6 21H22L20 19L20 14C20 7 14 4 14 4Z" stroke="#e0d0f0" stroke-width="1.5" fill="rgba(224,208,240,0.10)"/><path d="M11 21C11 22.66 12.34 24 14 24S17 22.66 17 21" stroke="#e0d0f0" stroke-width="1.3" fill="none"/><circle cx="14" cy="5" r="1.5" fill="#e0d0f0"/></g></svg><span class="sub-text" style="color:rgba(232,220,248,0.92)">구독</span></div>
      </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="bar-gradient"></div>
      <div class="bar-topline"></div>
      <div class="bar-inner">
        <div class="disk-wrap">
          <div class="disk"></div>
          <div class="disk-center"></div>
          <div class="disk-icon">🌸</div>
        </div>
        <div class="eq-wrap" id="eqWrap"></div>
        <div class="bar-copy">
          <div class="bar-line bar-lyric" data-preview-lyric>레이스처럼 섬세한 너의 손길</div>
          <div class="bar-line bar-song" data-preview-title data-preview-title-fallback style="display:none;">하얀 드레스</div>
        </div>
        <div class="bar-logo">
          <div class="bar-logo-name">POP WiFi</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
