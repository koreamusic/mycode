<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>33 · 한지 찢김</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
  <div class="mv-wrap" id="mv">
    <div class="bg"></div>
    <div class="particles" id="particles"></div>
    <div class="frame-layer" id="frameLayer">
      <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
    </div>

    <div class="title-layer">
      <div class="title-main" id="titleMain" data-preview-title>한지 위의 편지</div>
    </div>

    <div class="sub-layer" id="subLayer">
      <div class="sub-card">
        <style>.sub-anim.active .hjrg7p4{animation:hjRrg7p4 0.9s ease forwards;}@keyframes hjRrg7p4{0%{clip-path:inset(0 100% 0 0);opacity:0;}100%{clip-path:inset(0 0 0 0);opacity:1;}}</style><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><path class="hjrg7p4" d="M14 22C14 22 4 15 4 9C4 6 6.5 4 9.5 4C11.5 4 13 5 14 7C15 5 16.5 4 18.5 4C21.5 4 24 6 24 9C24 15 14 22 14 22Z" stroke="#a89060" stroke-width="1.8" fill="rgba(168,144,96,0.15)" style="opacity:0"/></svg><span class="sub-text" style="color:rgba(222,200,152,0.92)">좋아요</span></div><div class="sub-divider" style="background:rgba(170,145,90,0.22);width:1px;height:22px;"></div><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><path class="hjrg7p4" d="M14 4C14 4 8 7 8 14L8 19L6 21H22L20 19L20 14C20 7 14 4 14 4Z" stroke="#b8a070" stroke-width="1.5" fill="rgba(184,160,112,0.1)" style="opacity:0"/><path class="hjrg7p4" d="M11 21C11 22.66 12.34 24 14 24S17 22.66 17 21" stroke="#b8a070" stroke-width="1.3" fill="none" style="opacity:0"/><circle class="hjrg7p4" cx="14" cy="5" r="1.5" fill="#b8a070" style="opacity:0"/></svg><span class="sub-text" style="color:rgba(222,200,152,0.92)">구독</span></div>
      </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="bar-gradient"></div>
      <div class="bar-topline"></div>
      <div class="bar-inner">
        <div class="disk-wrap">
          <div class="disk"></div>
          <div class="disk-center"></div>
          <div class="disk-icon">✍️</div>
        </div>
        <div class="eq-wrap" id="eqWrap"></div>
        <div class="bar-copy">
          <div class="bar-line bar-lyric" data-preview-lyric>찢어진 한지처럼 낡은 이야기</div>
          <div class="bar-line bar-song" data-preview-title data-preview-title-fallback style="display:none;">한지 위의 편지</div>
        </div>
        <div class="bar-logo">
          <div class="bar-logo-name">POP WiFi</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
