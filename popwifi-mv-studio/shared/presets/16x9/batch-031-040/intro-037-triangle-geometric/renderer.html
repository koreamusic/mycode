<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>37 · 삼각형 기하학</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
  <div class="mv-wrap" id="mv">
    <div class="bg"></div>
    <div class="particles" id="particles"></div>
    <div class="frame-layer" id="frameLayer">
      <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
    </div>

    <div class="title-layer">
      <div class="title-main" id="titleMain" data-preview-title>Sharp Edge</div>
    </div>

    <div class="sub-layer" id="subLayer">
      <div class="sub-card">
        <style>.sub-anim.active .tro9nun{animation:trPopo9nun 0.6s cubic-bezier(0.34,1.6,0.64,1) forwards;}@keyframes trPopo9nun{0%{transform:scale(0) rotate(-60deg);}60%{transform:scale(1.2) rotate(5deg);}100%{transform:scale(1) rotate(0);}}</style><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><polygon class="tro9nun" points="14,3 26,24 2,24" stroke="#30d8c0" stroke-width="1.5" fill="rgba(48,216,192,0.15)" style="transform-origin:14px 14px;transform:scale(0)"/></svg><span class="sub-text" style="color:rgba(160,240,232,0.92)">좋아요</span></div><div class="sub-divider" style="background:rgba(40,220,195,0.24);width:1px;height:22px;"></div><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="tro9nun" style="transform-origin:14px 14px;transform:scale(0)"><path d="M14 4C14 4 8 7 8 14L8 19L6 21H22L20 19L20 14C20 7 14 4 14 4Z" stroke="#40e8d0" stroke-width="1.5" fill="rgba(64,232,208,0.1)"/><path d="M11 21C11 22.66 12.34 24 14 24S17 22.66 17 21" stroke="#40e8d0" stroke-width="1.3" fill="none"/><circle cx="14" cy="5" r="1.5" fill="#40e8d0"/></g></svg><span class="sub-text" style="color:rgba(160,240,232,0.92)">구독</span></div>
      </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="bar-gradient"></div>
      <div class="bar-topline"></div>
      <div class="bar-inner">
        <div class="disk-wrap">
          <div class="disk"></div>
          <div class="disk-center"></div>
          <div class="disk-icon">⚡</div>
        </div>
        <div class="eq-wrap" id="eqWrap"></div>
        <div class="bar-copy">
          <div class="bar-line bar-lyric" data-preview-lyric>날카롭고 선명한 너의 존재</div>
          <div class="bar-line bar-song" data-preview-title data-preview-title-fallback style="display:none;">Sharp Edge</div>
        </div>
        <div class="bar-logo">
          <div class="bar-logo-name">POP WiFi</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
