<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>44 · 회로기판</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
  <div class="mv-wrap" id="mv">
    <div class="bg"></div>
    <div class="particles" id="particles"></div>
    <div class="frame-layer" id="frameLayer">
      <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
    </div>

    <div class="title-layer">
      <div class="title-main" id="titleMain" data-preview-title>Electric Circuit</div>
    </div>

    <div class="sub-layer" id="subLayer">
      <div class="sub-card">
        <style>.sub-anim.active .cckmah4{animation:ccPulsekmah4 0.5s ease forwards;}@keyframes ccPulsekmah4{0%{opacity:0;filter:brightness(3);}40%{opacity:1;filter:brightness(2);}100%{opacity:1;filter:brightness(1);}}.sub-anim.active .cwkmah4{animation:cwFlowkmah4 1s linear infinite;}@keyframes cwFlowkmah4{0%{stroke-dashoffset:30;}100%{stroke-dashoffset:0;}}</style><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="cckmah4" style="opacity:0"><path class="cwkmah4" d="M4,14 L8,14 L10,8 L12,20 L14,12 L16,18 L18,14 L24,14" stroke="#00e8a0" stroke-width="1.8" fill="none" stroke-dasharray="8 3" stroke-dashoffset="30"/></g></svg><span class="sub-text" style="color:rgba(150,255,220,0.92)">좋아요</span></div><div class="sub-divider" style="background:rgba(0,232,160,0.24);width:1px;height:22px;"></div><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="cckmah4" style="opacity:0"><path d="M14 4C14 4 8 7 8 14L8 19L6 21H22L20 19L20 14C20 7 14 4 14 4Z" stroke="#00f0a8" stroke-width="1.5" fill="rgba(0,240,168,0.1)"/><path d="M11 21C11 22.66 12.34 24 14 24S17 22.66 17 21" stroke="#00f0a8" stroke-width="1.3" fill="none"/><circle cx="14" cy="5" r="1.5" fill="#00f0a8"/></g></svg><span class="sub-text" style="color:rgba(150,255,220,0.92)">구독</span></div>
      </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="bar-gradient"></div>
      <div class="bar-topline"></div>
      <div class="bar-inner">
        <div class="disk-wrap">
          <div class="disk"></div>
          <div class="disk-center"></div>
          <div class="disk-icon">⚡</div>
        </div>
        <div class="eq-wrap" id="eqWrap"></div>
        <div class="bar-copy">
          <div class="bar-line bar-lyric" data-preview-lyric>전류처럼 흐르는 감정</div>
          <div class="bar-line bar-song" data-preview-title data-preview-title-fallback style="display:none;">Electric Circuit</div>
        </div>
        <div class="bar-logo">
          <div class="bar-logo-name">POP WiFi</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
