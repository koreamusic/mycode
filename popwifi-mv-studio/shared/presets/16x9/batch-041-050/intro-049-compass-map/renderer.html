<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>49 · 나침반 지도</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
  <div class="mv-wrap" id="mv">
    <div class="bg"></div>
    <div class="particles" id="particles"></div>
    <div class="frame-layer" id="frameLayer">
      <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
    </div>

    <div class="title-layer">
      <div class="title-main" id="titleMain" data-preview-title>어딘가에서</div>

    <div class="sub-layer" id="subLayer">
      <div class="sub-card">
        <style>.sub-anim.active .cp87qxw{animation:cpSpin87qxw 0.8s cubic-bezier(0.34,1.4,0.64,1) forwards;}@keyframes cpSpin87qxw{0%{transform:rotate(-180deg) scale(0);opacity:0;}70%{transform:rotate(10deg) scale(1.1);}100%{transform:rotate(0) scale(1);opacity:1;}}</style><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="cp87qxw" style="transform-origin:14px 14px;opacity:0"><circle cx="14" cy="14" r="11" stroke="#6098b8" stroke-width="1.4" fill="rgba(96,152,184,0.08)"/><circle cx="14" cy="14" r="7" stroke="#6098b8" stroke-width="0.7" fill="none" opacity="0.40"/><path d="M14,4 L16,14 L14,13 L12,14 Z" fill="#e06040" opacity="0.85"/><path d="M14,24 L12,14 L14,15 L16,14 Z" fill="#6098b8" opacity="0.75"/><circle cx="14" cy="14" r="2" fill="#6098b8"/></g></svg><span class="sub-text" style="color:rgba(175,210,230,0.92)">좋아요</span></div><div class="sub-divider" style="background:rgba(88,150,180,0.22);width:1px;height:22px;"></div><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="cp87qxw" style="transform-origin:14px 14px;opacity:0"><path d="M14 4C14 4 8 7 8 14L8 19L6 21H22L20 19L20 14C20 7 14 4 14 4Z" stroke="#70a8c8" stroke-width="1.5" fill="rgba(112,168,200,0.10)"/><path d="M11 21C11 22.66 12.34 24 14 24S17 22.66 17 21" stroke="#70a8c8" stroke-width="1.3" fill="none"/><circle cx="14" cy="5" r="1.5" fill="#70a8c8"/></g></svg><span class="sub-text" style="color:rgba(175,210,230,0.92)">구독</span></div>
      </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="bar-gradient"></div>
      <div class="bar-topline"></div>
      <div class="bar-inner">
        <div class="disk-wrap">
          <div class="disk"></div>
          <div class="disk-center"></div>
          <div class="disk-icon">🗺️</div>
        </div>
        <div class="eq-wrap" id="eqWrap"></div>
        <div class="bar-copy">
          <div class="bar-line bar-lyric" data-preview-lyric>나침반이 가리키는 너의 방향</div>
          <div class="bar-line bar-song" data-preview-title data-preview-title-fallback style="display:none;">어딘가에서</div>
        </div>
        <div class="bar-logo">
          <div class="bar-logo-name">POP WiFi</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
