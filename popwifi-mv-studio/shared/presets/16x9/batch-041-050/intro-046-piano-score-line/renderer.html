<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>46 · 피아노 악보선</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
  <div class="mv-wrap" id="mv">
    <div class="bg"></div>
    <div class="particles" id="particles"></div>
    <div class="frame-layer" id="frameLayer">
      <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
    </div>

    <div class="title-layer">
      <div class="title-main" id="titleMain" data-preview-title>오선지</div>
    </div>

    <div class="sub-layer" id="subLayer">
      <div class="sub-card">
        <style>.sub-anim.active .scsah09{animation:scNotesah09 0.7s cubic-bezier(0.34,1.4,0.64,1) forwards;}@keyframes scNotesah09{0%{transform:translateY(-20px);opacity:0;}100%{transform:translateY(0);opacity:1;}}</style><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="scsah09" style="opacity:0"><ellipse cx="10" cy="21" rx="5" ry="3.5" fill="#8080c0" opacity="0.8" transform="rotate(-25,10,21)"/><line x1="15" y1="20" x2="15" y2="6" stroke="#8080c0" stroke-width="1.5"/><path d="M15,6 Q22,4 22,9 Q22,14 15,13" stroke="#8080c0" stroke-width="1.2" fill="rgba(128,128,192,0.15)"/></g></svg><span class="sub-text" style="color:rgba(200,200,240,0.92)">좋아요</span></div><div class="sub-divider" style="background:rgba(120,120,195,0.20);width:1px;height:22px;"></div><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="scsah09" style="opacity:0"><path d="M14 4C14 4 8 7 8 14L8 19L6 21H22L20 19L20 14C20 7 14 4 14 4Z" stroke="#9090d0" stroke-width="1.5" fill="rgba(144,144,208,0.10)"/><path d="M11 21C11 22.66 12.34 24 14 24S17 22.66 17 21" stroke="#9090d0" stroke-width="1.3" fill="none"/><circle cx="14" cy="5" r="1.5" fill="#9090d0"/></g></svg><span class="sub-text" style="color:rgba(200,200,240,0.92)">구독</span></div>
      </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="bar-gradient"></div>
      <div class="bar-topline"></div>
      <div class="bar-inner">
        <div class="disk-wrap">
          <div class="disk"></div>
          <div class="disk-center"></div>
          <div class="disk-icon">♪</div>
        </div>
        <div class="eq-wrap" id="eqWrap"></div>
        <div class="bar-copy">
          <div class="bar-line bar-lyric" data-preview-lyric>오선지 위에 새겨진 우리의 노래</div>
          <div class="bar-line bar-song" data-preview-title data-preview-title-fallback style="display:none;">오선지</div>
        </div>
        <div class="bar-logo">
          <div class="bar-logo-name">POP WiFi</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
