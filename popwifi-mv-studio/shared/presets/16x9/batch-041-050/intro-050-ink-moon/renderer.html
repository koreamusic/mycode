<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>50 · 수묵 달</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
  <div class="mv-wrap" id="mv">
    <div class="bg"></div>
    <div class="particles" id="particles"></div>
    <div class="frame-layer" id="frameLayer">
      <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
    </div>

    <div class="title-layer">
      <div class="title-main" id="titleMain" data-preview-title>달빛 소나타</div>
    </div>

    <div class="sub-layer" id="subLayer">
      <div class="sub-card">
        <style>.sub-anim.active .moeb89o{animation:moRiseeb89o 1s ease forwards;}@keyframes moRiseeb89o{0%{transform:translateY(30px);opacity:0;filter:blur(6px);}60%{filter:blur(1px);}100%{transform:translateY(0);opacity:1;filter:blur(0);}}</style><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="moeb89o" style="opacity:0"><circle cx="14" cy="14" r="10" stroke="#c0b8e0" stroke-width="1.4" fill="rgba(192,184,224,0.10)"/><path d="M20,14 A9,9 0 1,1 14,5 A7,7 0 1,0 20,14 Z" fill="#c0b8e0" opacity="0.55"/></g></svg><span class="sub-text" style="color:rgba(224,220,248,0.92)">좋아요</span></div><div class="sub-divider" style="background:rgba(186,178,222,0.20);width:1px;height:22px;"></div><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="moeb89o" style="opacity:0"><path d="M14 4C14 4 8 7 8 14L8 19L6 21H22L20 19L20 14C20 7 14 4 14 4Z" stroke="#d0c8f0" stroke-width="1.5" fill="rgba(208,200,240,0.10)"/><path d="M11 21C11 22.66 12.34 24 14 24S17 22.66 17 21" stroke="#d0c8f0" stroke-width="1.3" fill="none"/><circle cx="14" cy="5" r="1.5" fill="#d0c8f0"/></g></svg><span class="sub-text" style="color:rgba(224,220,248,0.92)">구독</span></div>
      </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="bar-gradient"></div>
      <div class="bar-topline"></div>
      <div class="bar-inner">
        <div class="disk-wrap">
          <div class="disk"></div>
          <div class="disk-center"></div>
          <div class="disk-icon">🌙</div>
        </div>
        <div class="eq-wrap" id="eqWrap"></div>
        <div class="bar-copy">
          <div class="bar-line bar-lyric" data-preview-lyric>달빛 아래 흐르는 너의 선율</div>
          <div class="bar-line bar-song" data-preview-title data-preview-title-fallback style="display:none;">달빛 소나타</div>
        </div>
        <div class="bar-logo">
          <div class="bar-logo-name">POP WiFi</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
