<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>45 · 오리가미</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
  <div class="mv-wrap" id="mv">
    <div class="bg"></div>
    <div class="particles" id="particles"></div>
    <div class="frame-layer" id="frameLayer">
      <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
    </div>

    <div class="title-layer">
      <div class="title-main" id="titleMain" data-preview-title>종이학</div>
    </div>

    <div class="sub-layer" id="subLayer">
      <div class="sub-card">
        <style>.sub-anim.active .ogwyn9y{animation:ogFoldwyn9y 0.8s cubic-bezier(0.34,1.3,0.64,1) forwards;}@keyframes ogFoldwyn9y{0%{transform:scale(0) rotateX(-90deg);opacity:0;}60%{transform:scale(1.1) rotateX(5deg);}100%{transform:scale(1) rotateX(0);opacity:1;}}</style><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="ogwyn9y" style="opacity:0"><path d="M4,22 L14,4 L24,22 L18,17 L14,27 L10,17 Z" stroke="#c0b8e8" stroke-width="1.4" fill="rgba(192,184,232,0.15)"/></g></svg><span class="sub-text" style="color:rgba(220,216,248,0.92)">좋아요</span></div><div class="sub-divider" style="background:rgba(185,180,230,0.20);width:1px;height:22px;"></div><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="ogwyn9y" style="opacity:0"><path d="M14 4C14 4 8 7 8 14L8 19L6 21H22L20 19L20 14C20 7 14 4 14 4Z" stroke="#d0c8f8" stroke-width="1.5" fill="rgba(208,200,248,0.10)"/><path d="M11 21C11 22.66 12.34 24 14 24S17 22.66 17 21" stroke="#d0c8f8" stroke-width="1.3" fill="none"/><circle cx="14" cy="5" r="1.5" fill="#d0c8f8"/></g></svg><span class="sub-text" style="color:rgba(220,216,248,0.92)">구독</span></div>
      </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="bar-gradient"></div>
      <div class="bar-topline"></div>
      <div class="bar-inner">
        <div class="disk-wrap">
          <div class="disk"></div>
          <div class="disk-center"></div>
          <div class="disk-icon">🕊️</div>
        </div>
        <div class="eq-wrap" id="eqWrap"></div>
        <div class="bar-copy">
          <div class="bar-line bar-lyric" data-preview-lyric>천 개의 학처럼 쌓아온 소원</div>
          <div class="bar-line bar-song" data-preview-title data-preview-title-fallback style="display:none;">종이학</div>
        </div>
        <div class="bar-logo">
          <div class="bar-logo-name">POP WiFi</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
