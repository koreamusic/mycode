<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>48 · 빈티지 신문</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
  <div class="mv-wrap" id="mv">
    <div class="bg"></div>
    <div class="particles" id="particles"></div>
    <div class="frame-layer" id="frameLayer">
      <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
    </div>

    <div class="title-layer">
      <div class="title-main" id="titleMain" data-preview-title>오래된 뉴스</div>
    </div>

    <div class="sub-layer" id="subLayer">
      <div class="sub-card">
        <style>.sub-anim.active .npkkp9b{animation:npTypekkp9b 0.6s steps(6) forwards;}@keyframes npTypekkp9b{0%{opacity:0;width:0;}100%{opacity:1;width:100%;}}</style><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="npkkp9b" style="opacity:0"><path d="M14 22C14 22 4 15 4 9C4 6 6.5 4 9.5 4C11.5 4 13 5 14 7C15 5 16.5 4 18.5 4C21.5 4 24 6 24 9C24 15 14 22 14 22Z" stroke="#b0983c" stroke-width="1.6" fill="rgba(176,152,60,0.15)"/></g></svg><span class="sub-text" style="color:rgba(225,200,138,0.92)">좋아요</span></div><div class="sub-divider" style="background:rgba(172,148,55,0.22);width:1px;height:22px;"></div><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="npkkp9b" style="opacity:0"><path d="M14 4C14 4 8 7 8 14L8 19L6 21H22L20 19L20 14C20 7 14 4 14 4Z" stroke="#c0a84c" stroke-width="1.5" fill="rgba(192,168,76,0.10)"/><path d="M11 21C11 22.66 12.34 24 14 24S17 22.66 17 21" stroke="#c0a84c" stroke-width="1.3" fill="none"/><circle cx="14" cy="5" r="1.5" fill="#c0a84c"/></g></svg><span class="sub-text" style="color:rgba(225,200,138,0.92)">구독</span></div>
      </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="bar-gradient"></div>
      <div class="bar-topline"></div>
      <div class="bar-inner">
        <div class="disk-wrap">
          <div class="disk"></div>
          <div class="disk-center"></div>
          <div class="disk-icon">📄</div>
        </div>
        <div class="eq-wrap" id="eqWrap"></div>
        <div class="bar-copy">
          <div class="bar-line bar-lyric" data-preview-lyric>누렇게 바랜 신문 속 너의 소식</div>
          <div class="bar-line bar-song" data-preview-title data-preview-title-fallback style="display:none;">오래된 뉴스</div>
        </div>
        <div class="bar-logo">
          <div class="bar-logo-name">POP WiFi</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
