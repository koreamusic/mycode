<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>47 · 파도 이중선</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
  <div class="mv-wrap" id="mv">
    <div class="bg"></div>
    <div class="particles" id="particles"></div>
    <div class="frame-layer" id="frameLayer">
      <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
    </div>

    <div class="title-layer">
      <div class="title-main" id="titleMain" data-preview-title>Double Wave</div>
    </div>

    <div class="sub-layer" id="subLayer">
      <div class="sub-card">
        <style>.sub-anim.active .dwde3wl{animation:dwRidede3wl 0.7s ease forwards;}@keyframes dwRidede3wl{0%{transform:translateY(15px);opacity:0;}100%{transform:translateY(0);opacity:1;}}</style><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="dwde3wl" style="opacity:0"><path d="M3,14 Q8,9 14,14 Q20,19 25,14" stroke="#40b0e0" stroke-width="2" fill="none" stroke-linecap="round"/><path d="M3,19 Q8,14 14,19 Q20,24 25,19" stroke="#40b0e0" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.55"/></g></svg><span class="sub-text" style="color:rgba(165,225,248,0.92)">좋아요</span></div><div class="sub-divider" style="background:rgba(50,180,220,0.24);width:1px;height:22px;"></div><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="dwde3wl" style="opacity:0"><path d="M14 4C14 4 8 7 8 14L8 19L6 21H22L20 19L20 14C20 7 14 4 14 4Z" stroke="#50c0f0" stroke-width="1.5" fill="rgba(80,192,240,0.1)"/><path d="M11 21C11 22.66 12.34 24 14 24S17 22.66 17 21" stroke="#50c0f0" stroke-width="1.3" fill="none"/><circle cx="14" cy="5" r="1.5" fill="#50c0f0"/></g></svg><span class="sub-text" style="color:rgba(165,225,248,0.92)">구독</span></div>
      </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="bar-gradient"></div>
      <div class="bar-topline"></div>
      <div class="bar-inner">
        <div class="disk-wrap">
          <div class="disk"></div>
          <div class="disk-center"></div>
          <div class="disk-icon">〰️</div>
        </div>
        <div class="eq-wrap" id="eqWrap"></div>
        <div class="bar-copy">
          <div class="bar-line bar-lyric" data-preview-lyric>두 겹의 파도처럼 밀려오는 설렘</div>
          <div class="bar-line bar-song" data-preview-title data-preview-title-fallback style="display:none;">Double Wave</div>
        </div>
        <div class="bar-logo">
          <div class="bar-logo-name">POP WiFi</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
