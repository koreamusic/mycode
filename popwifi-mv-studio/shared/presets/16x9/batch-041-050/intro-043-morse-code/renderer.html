<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>43 · 모스 부호</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
  <div class="mv-wrap" id="mv">
    <div class="bg"></div>
    <div class="particles" id="particles"></div>
    <div class="frame-layer" id="frameLayer">
      <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
    </div>

    <div class="title-layer">
      <div class="title-main" id="titleMain" data-preview-title>신호</div>
    </div>

    <div class="sub-layer" id="subLayer">
      <div class="sub-card">
        <style>.sub-anim.active .mrk5zwo{animation:mrSignalk5zwo 0.4s ease forwards;}@keyframes mrSignalk5zwo{0%{opacity:0;}50%{opacity:1;}60%{opacity:0.3;}100%{opacity:1;}}</style><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="mrk5zwo" style="opacity:0"><circle cx="7" cy="14" r="3.5" fill="#40c060" opacity="0.85"/><rect x="13" y="10.5" width="10" height="7" rx="3.5" fill="#40c060" opacity="0.85"/></g></svg><span class="sub-text" style="color:rgba(150,235,170,0.92)">좋아요</span></div><div class="sub-divider" style="background:rgba(50,192,80,0.22);width:1px;height:22px;"></div><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="mrk5zwo" style="opacity:0"><path d="M14 4C14 4 8 7 8 14L8 19L6 21H22L20 19L20 14C20 7 14 4 14 4Z" stroke="#50d070" stroke-width="1.5" fill="rgba(80,208,112,0.1)"/><path d="M11 21C11 22.66 12.34 24 14 24S17 22.66 17 21" stroke="#50d070" stroke-width="1.3" fill="none"/><circle cx="14" cy="5" r="1.5" fill="#50d070"/></g></svg><span class="sub-text" style="color:rgba(150,235,170,0.92)">구독</span></div>
      </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="bar-gradient"></div>
      <div class="bar-topline"></div>
      <div class="bar-inner">
        <div class="disk-wrap">
          <div class="disk"></div>
          <div class="disk-center"></div>
          <div class="disk-icon">·−</div>
        </div>
        <div class="eq-wrap" id="eqWrap"></div>
        <div class="bar-copy">
          <div class="bar-line bar-lyric" data-preview-lyric>끝없이 보내는 너를 향한 신호</div>
          <div class="bar-line bar-song" data-preview-title data-preview-title-fallback style="display:none;">신호</div>
        </div>
        <div class="bar-logo">
          <div class="bar-logo-name">POP WiFi</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
