<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>23 · 재즈 드럼 루프</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
  <div class="mv-wrap" id="mv">
    <div class="bg"></div>
    <div class="particles" id="particles"></div>
    <div class="frame-layer" id="frameLayer">
      <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
    </div>

    <div class="title-layer">
      <div class="title-main" id="titleMain" data-preview-title>Drum Loop</div>
    </div>

    <div class="sub-layer" id="subLayer">
      <div class="sub-card">
        <style>.sub-anim.active .dm1gwwh{animation:dmHit1gwwh 0.5s cubic-bezier(0.34,1.6,0.64,1) forwards;}@keyframes dmHit1gwwh{0%{transform:scale(0);}60%{transform:scale(1.2);}100%{transform:scale(1);}}.sub-anim.active .dmr1gwwh{animation:dmRing1gwwh 0.8s ease-out 0.2s 1;opacity:0;}@keyframes dmRing1gwwh{0%{transform:scale(0.8);opacity:0.8;}100%{transform:scale(1.8);opacity:0;}}</style><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="dm1gwwh" style="transform-origin:14px 14px;transform:scale(0)"><ellipse cx="14" cy="13" rx="10" ry="6" stroke="#c86030" stroke-width="1.5" fill="rgba(200,96,48,0.15)"/><ellipse cx="14" cy="13" rx="10" ry="6" stroke="#c86030" stroke-width="0.6" fill="none" transform="translate(0,10)"/><line x1="4" y1="13" x2="4" y2="23" stroke="#c86030" stroke-width="1.3" opacity="0.8"/><line x1="24" y1="13" x2="24" y2="23" stroke="#c86030" stroke-width="1.3" opacity="0.8"/><path d="M4,23 Q14,28 24,23" stroke="#c86030" stroke-width="1.3" fill="none" opacity="0.8"/></g><circle class="dmr1gwwh" cx="14" cy="13" r="10" stroke="#c86030" stroke-width="1.5" fill="none"/></svg><span class="sub-text" style="color:rgba(240,180,140,0.92)">좋아요</span></div><div class="sub-divider" style="background:rgba(200,100,50,0.23);width:1px;height:22px;"></div><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="dm1gwwh" style="transform-origin:14px 14px;transform:scale(0)"><path d="M14 4C14 4 8 7 8 14L8 19L6 21H22L20 19L20 14C20 7 14 4 14 4Z" stroke="#d87040" stroke-width="1.6" fill="rgba(216,112,64,0.1)"/><path d="M11 21C11 22.66 12.34 24 14 24S17 22.66 17 21" stroke="#d87040" stroke-width="1.4" fill="none"/><circle cx="14" cy="5" r="1.5" fill="#d87040"/></g></svg><span class="sub-text" style="color:rgba(240,180,140,0.92)">구독</span></div>
      </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="bar-gradient"></div>
      <div class="bar-topline"></div>
      <div class="bar-inner">
        <div class="disk-wrap">
          <div class="disk"></div>
          <div class="disk-center"></div>
          <div class="disk-icon">🥁</div>
        </div>
        <div class="eq-wrap" id="eqWrap"></div>
        <div class="bar-copy">
          <div class="bar-line bar-lyric" data-preview-lyric>심장박동처럼 울려 퍼지는 비트</div>
          <div class="bar-line bar-song" data-preview-title data-preview-title-fallback style="display:none;">Drum Loop</div>
        </div>
        <div class="bar-logo">
          <div class="bar-logo-name">POP WiFi</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
