<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>26 · 팝 선셋</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
  <div class="mv-wrap" id="mv">
    <div class="bg"></div>
    <div class="particles" id="particles"></div>
    <div class="frame-layer" id="frameLayer">
      <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
    </div>

    <div class="title-layer">
      <div class="title-main" id="titleMain" data-preview-title>Sunset Glow</div>
    </div>

    <div class="sub-layer" id="subLayer">
      <div class="sub-card">
        <style>.sub-anim.active .ss9upt4{animation:ssRise9upt4 0.8s cubic-bezier(0.34,1.4,0.64,1) forwards;}@keyframes ssRise9upt4{0%{transform:translateY(20px) scale(0.8);opacity:0;}100%{transform:translateY(0) scale(1);opacity:1;}}</style><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="ss9upt4" style="opacity:0"><path d="M14 23C14 23 4 16 4 10C4 7 6.5 4.5 9.5 4.5C11.5 4.5 13 5.5 14 7C15 5.5 16.5 4.5 18.5 4.5C21.5 4.5 24 7 24 10C24 16 14 23 14 23Z" stroke="#ff7030" stroke-width="1.8" fill="rgba(255,112,48,0.2)"/><ellipse cx="14" cy="26" rx="8" ry="2" fill="rgba(255,112,48,0.15)"/></g></svg><span class="sub-text" style="color:rgba(255,200,160,0.92)">좋아요</span></div><div class="sub-divider" style="background:rgba(255,120,60,0.28);width:1px;height:22px;"></div><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="ss9upt4" style="opacity:0"><path d="M14 4C14 4 8 7 8 14L8 19L6 21H22L20 19L20 14C20 7 14 4 14 4Z" stroke="#ff8040" stroke-width="1.6" fill="rgba(255,128,64,0.12)"/><path d="M11 21C11 22.66 12.34 24 14 24S17 22.66 17 21" stroke="#ff8040" stroke-width="1.4" fill="none"/><circle cx="14" cy="5" r="1.5" fill="#ff8040"/></g></svg><span class="sub-text" style="color:rgba(255,200,160,0.92)">구독</span></div>
      </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="bar-gradient"></div>
      <div class="bar-topline"></div>
      <div class="bar-inner">
        <div class="disk-wrap">
          <div class="disk"></div>
          <div class="disk-center"></div>
          <div class="disk-icon">🌇</div>
        </div>
        <div class="eq-wrap" id="eqWrap"></div>
        <div class="bar-copy">
          <div class="bar-line bar-lyric" data-preview-lyric>노을빛으로 물드는 너의 미소</div>
          <div class="bar-line bar-song" data-preview-title data-preview-title-fallback style="display:none;">Sunset Glow</div>
        </div>
        <div class="bar-logo">
          <div class="bar-logo-name">POP WiFi</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
