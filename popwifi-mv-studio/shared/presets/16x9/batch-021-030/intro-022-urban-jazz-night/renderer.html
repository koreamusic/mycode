<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>22 · 어반 재즈 나이트</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
  <div class="mv-wrap" id="mv">
    <div class="bg"></div>
    <div class="particles" id="particles"></div>
    <div class="frame-layer" id="frameLayer">
      <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
    </div>

    <div class="title-layer">
      <div class="title-main" id="titleMain" data-preview-title>Urban Night</div>
    </div>

    <div class="sub-layer" id="subLayer">
      <div class="sub-card">
        <style>.sub-anim.active .ujqy8a5{animation:ujFadeqy8a5 0.8s ease forwards;}@keyframes ujFadeqy8a5{0%{opacity:0;transform:scale(0.8);}100%{opacity:1;transform:scale(1);}}</style><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="ujqy8a5" style="opacity:0"><rect x="4" y="16" width="3" height="8" rx="0.5" fill="#9070c0" opacity="0.4"/><rect x="8" y="12" width="3" height="12" rx="0.5" fill="#9070c0" opacity="0.48000000000000004"/><rect x="12" y="8" width="3" height="16" rx="0.5" fill="#9070c0" opacity="0.56"/><rect x="16" y="16" width="3" height="8" rx="0.5" fill="#9070c0" opacity="0.64"/><rect x="20" y="12" width="3" height="12" rx="0.5" fill="#9070c0" opacity="0.72"/><rect x="24" y="8" width="3" height="16" rx="0.5" fill="#9070c0" opacity="0.8"/></g></svg><span class="sub-text" style="color:rgba(205,185,245,0.92)">좋아요</span></div><div class="sub-divider" style="background:rgba(140,110,200,0.23);width:1px;height:22px;"></div><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="ujqy8a5" style="opacity:0"><path d="M14 4C14 4 8 7 8 14L8 19L6 21H22L20 19L20 14C20 7 14 4 14 4Z" stroke="#a080d0" stroke-width="1.6" fill="rgba(160,128,208,0.1)"/><path d="M11 21C11 22.66 12.34 24 14 24S17 22.66 17 21" stroke="#a080d0" stroke-width="1.4" fill="none"/><circle cx="14" cy="5" r="1.5" fill="#a080d0"/></g></svg><span class="sub-text" style="color:rgba(205,185,245,0.92)">구독</span></div>
      </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="bar-gradient"></div>
      <div class="bar-topline"></div>
      <div class="bar-inner">
        <div class="disk-wrap">
          <div class="disk"></div>
          <div class="disk-center"></div>
          <div class="disk-icon">🏙️</div>
        </div>
        <div class="eq-wrap" id="eqWrap"></div>
        <div class="bar-copy">
          <div class="bar-line bar-lyric" data-preview-lyric>도심의 밤을 물들이는 선율</div>
          <div class="bar-line bar-song" data-preview-title data-preview-title-fallback style="display:none;">Urban Night</div>
        </div>
        <div class="bar-logo">
          <div class="bar-logo-name">POP WiFi</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
