<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>30 · 드림팝 우주</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
  <div class="mv-wrap" id="mv">
    <div class="bg"></div>
    <div class="particles" id="particles"></div>
    <div class="frame-layer" id="frameLayer">
      <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
    </div>

    <div class="title-layer">
      <div class="title-main" id="titleMain" data-preview-title>Dream Space</div>
    </div>

    <div class="sub-layer" id="subLayer">
      <div class="sub-card">
        <style>.sub-anim.active .dpml70i{animation:dpOrbitml70i 0.8s cubic-bezier(0.34,1.5,0.64,1) forwards;}@keyframes dpOrbitml70i{0%{transform:scale(0) rotate(-90deg);opacity:0;}70%{transform:scale(1.1) rotate(5deg);}100%{transform:scale(1) rotate(0deg);opacity:1;}}.sub-anim.active .dpoml70i{animation:dpoSpinml70i 3s linear infinite;}@keyframes dpoSpinml70i{to{transform:rotate(360deg);}}</style><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="dpml70i" style="transform-origin:14px 14px;opacity:0"><circle cx="14" cy="14" r="8" stroke="#9050e0" stroke-width="1.4" fill="rgba(144,80,224,0.12)"/><g class="dpoml70i" style="transform-origin:14px 14px"><circle cx="22" cy="14" r="3" fill="#c080ff" opacity="0.8"/></g><circle cx="14" cy="14" r="2.5" fill="#9050e0" opacity="0.9"/></g></svg><span class="sub-text" style="color:rgba(220,190,255,0.92)">좋아요</span></div><div class="sub-divider" style="background:rgba(160,90,240,0.30);width:1px;height:22px;"></div><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="dpml70i" style="transform-origin:14px 14px;opacity:0"><path d="M14 4C14 4 8 7 8 14L8 19L6 21H22L20 19L20 14C20 7 14 4 14 4Z" stroke="#b070f8" stroke-width="1.6" fill="rgba(176,112,248,0.12)"/><path d="M11 21C11 22.66 12.34 24 14 24S17 22.66 17 21" stroke="#b070f8" stroke-width="1.4" fill="none"/><circle cx="14" cy="5" r="1.5" fill="#b070f8"/></g></svg><span class="sub-text" style="color:rgba(220,190,255,0.92)">구독</span></div>
      </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="bar-gradient"></div>
      <div class="bar-topline"></div>
      <div class="bar-inner">
        <div class="disk-wrap">
          <div class="disk"></div>
          <div class="disk-center"></div>
          <div class="disk-icon">🌠</div>
        </div>
        <div class="eq-wrap" id="eqWrap"></div>
        <div class="bar-copy">
          <div class="bar-line bar-lyric" data-preview-lyric>우주 끝까지 닿을 것 같은 꿈</div>
          <div class="bar-line bar-song" data-preview-title data-preview-title-fallback style="display:none;">Dream Space</div>
        </div>
        <div class="bar-logo">
          <div class="bar-logo-name">POP WiFi</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
