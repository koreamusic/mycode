<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>29 · K팝 글리터</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
  <div class="mv-wrap" id="mv">
    <div class="bg"></div>
    <div class="particles" id="particles"></div>
    <div class="frame-layer" id="frameLayer">
      <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
    </div>

    <div class="title-layer">
      <div class="title-main" id="titleMain" data-preview-title>Glitter Pop</div>
    </div>

    <div class="sub-layer" id="subLayer">
      <div class="sub-card">
        <style>.sub-anim.active .kpuxj23{animation:kpGlituxj23 0.6s cubic-bezier(0.34,1.6,0.64,1) forwards;}@keyframes kpGlituxj23{0%{transform:scale(0) rotate(-45deg);opacity:0;}60%{transform:scale(1.2) rotate(5deg);}100%{transform:scale(1) rotate(0deg);opacity:1;}}.sub-anim.active .ksuxj23{animation:ksSpinuxj23 3s linear infinite;}@keyframes ksSpinuxj23{to{transform:rotate(360deg);}}</style><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="kpuxj23" style="transform-origin:14px 14px;opacity:0"><path d="M14 3L16.8 10.4H24.7L18.5 15L20.9 22.5L14 18L7.1 22.5L9.5 15L3.3 10.4H11.2Z" fill="#ff50c8" opacity="0.9" stroke="#ff80d8" stroke-width="0.5"/></g></svg><span class="sub-text" style="color:rgba(255,200,240,0.92)">좋아요</span></div><div class="sub-divider" style="background:rgba(255,100,210,0.30);width:1px;height:22px;"></div><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="kpuxj23" style="transform-origin:14px 14px;opacity:0"><path class="ksuxj23" d="M14 4C14 4 8 7 8 14L8 19L6 21H22L20 19L20 14C20 7 14 4 14 4Z" stroke="#ff70d8" stroke-width="1.6" fill="rgba(255,112,216,0.12)" style="transform-origin:14px 14px"/><path d="M11 21C11 22.66 12.34 24 14 24S17 22.66 17 21" stroke="#ff70d8" stroke-width="1.4" fill="none"/><circle cx="14" cy="5" r="1.5" fill="#ff70d8"/></g></svg><span class="sub-text" style="color:rgba(255,200,240,0.92)">구독</span></div>
      </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="bar-gradient"></div>
      <div class="bar-topline"></div>
      <div class="bar-inner">
        <div class="disk-wrap">
          <div class="disk"></div>
          <div class="disk-center"></div>
          <div class="disk-icon">⭐</div>
        </div>
        <div class="eq-wrap" id="eqWrap"></div>
        <div class="bar-copy">
          <div class="bar-line bar-lyric" data-preview-lyric>빛나는 순간이 영원하길</div>
          <div class="bar-line bar-song" data-preview-title data-preview-title-fallback style="display:none;">Glitter Pop</div>
        </div>
        <div class="bar-logo">
          <div class="bar-logo-name">POP WiFi</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
