<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>21 · 피아노 바 블루</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
  <div class="mv-wrap" id="mv">
    <div class="bg"></div>
    <div class="particles" id="particles"></div>
    <div class="frame-layer" id="frameLayer">
      <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
    </div>

    <div class="title-layer">
      <div class="title-main" id="titleMain" data-preview-title>Blue Piano Bar</div>
    </div>

    <div class="sub-layer" id="subLayer">
      <div class="sub-card">
        <style>.sub-anim.active .pb3eyok{animation:pbKeys3eyok 0.6s ease forwards;}@keyframes pbKeys3eyok{0%{transform:translateY(-15px);opacity:0;}100%{transform:translateY(0);opacity:1;}}</style><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="pb3eyok" style="opacity:0"><rect x="4" y="8" width="3" height="14" rx="1" fill="rgba(72,104,192,0.7)" opacity="0.5"/><rect x="8" y="8" width="3" height="14" rx="1" fill="rgba(72,104,192,0.7)" opacity="0.6"/><rect x="12" y="8" width="3" height="14" rx="1" fill="rgba(72,104,192,0.7)" opacity="0.7"/><rect x="16" y="8" width="3" height="14" rx="1" fill="rgba(72,104,192,0.7)" opacity="0.8"/><rect x="20" y="8" width="3" height="14" rx="1" fill="rgba(72,104,192,0.7)" opacity="0.9"/><rect x="6" y="8" width="2" height="9" rx="1" fill="rgba(72,104,192,0.9)"/><rect x="13" y="8" width="2" height="9" rx="1" fill="rgba(72,104,192,0.9)"/><rect x="19" y="8" width="2" height="9" rx="1" fill="rgba(72,104,192,0.9)"/></g></svg><span class="sub-text" style="color:rgba(165,185,245,0.92)">좋아요</span></div><div class="sub-divider" style="background:rgba(70,110,200,0.23);width:1px;height:22px;"></div><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="pb3eyok" style="opacity:0"><path d="M14 4C14 4 8 7 8 14L8 19L6 21H22L20 19L20 14C20 7 14 4 14 4Z" stroke="#5878d0" stroke-width="1.6" fill="rgba(88,120,208,0.1)"/><path d="M11 21C11 22.66 12.34 24 14 24S17 22.66 17 21" stroke="#5878d0" stroke-width="1.4" fill="none"/><circle cx="14" cy="5" r="1.5" fill="#5878d0"/></g></svg><span class="sub-text" style="color:rgba(165,185,245,0.92)">구독</span></div>
      </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="bar-gradient"></div>
      <div class="bar-topline"></div>
      <div class="bar-inner">
        <div class="disk-wrap">
          <div class="disk"></div>
          <div class="disk-center"></div>
          <div class="disk-icon">🎵</div>
        </div>
        <div class="eq-wrap" id="eqWrap"></div>
        <div class="bar-copy">
          <div class="bar-line bar-lyric" data-preview-lyric>피아노 선율에 취하는 밤</div>
          <div class="bar-line bar-song" data-preview-title data-preview-title-fallback style="display:none;">Blue Piano Bar</div>
        </div>
        <div class="bar-logo">
          <div class="bar-logo-name">POP WiFi</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
