<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>10 · 여름 파도</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
  <div class="mv-wrap" id="mv">
    <div class="bg"></div>
    <div class="particles" id="particles"></div>
    <div class="frame-layer" id="frameLayer">
      <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
    </div>

    <div class="title-layer">
      <div class="title-main" id="titleMain" data-preview-title>파도 소리</div>
    </div>

    <div class="sub-layer" id="subLayer">
      <div class="sub-card">
        <style>.sub-anim.active .wvt07um{animation:wvInt07um 0.8s ease forwards;}@keyframes wvInt07um{0%{transform:translateX(-20px);opacity:0;}100%{transform:translateX(0);opacity:1;}}</style><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="wvt07um" style="opacity:0"><path d="M3 16C3 16 6 11 9 14C12 17 15 12 18 15C21 18 25 13 25 13" stroke="#40c0d8" stroke-width="2" fill="none" stroke-linecap="round"/><path d="M3 20C3 20 6 15 9 18C12 21 15 16 18 19C21 22 25 17 25 17" stroke="#40c0d8" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.5"/></g></svg><span class="sub-text" style="color:rgba(160,230,240,0.92)">좋아요</span></div><div class="sub-divider" style="background:rgba(40,180,210,0.25);width:1px;height:22px;"></div><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="wvt07um" style="opacity:0"><path d="M14 4C14 4 8 7 8 14L8 19L6 21H22L20 19L20 14C20 7 14 4 14 4Z" stroke="#50d0e8" stroke-width="1.6" fill="rgba(80,208,232,0.1)"/><path d="M11 21C11 22.66 12.34 24 14 24S17 22.66 17 21" stroke="#50d0e8" stroke-width="1.4" fill="none"/><circle cx="14" cy="5" r="1.5" fill="#50d0e8"/></g></svg><span class="sub-text" style="color:rgba(160,230,240,0.92)">구독</span></div>
      </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="bar-gradient"></div>
      <div class="bar-topline"></div>
      <div class="bar-inner">
        <div class="disk-wrap">
          <div class="disk"></div>
          <div class="disk-center"></div>
          <div class="disk-icon">🌊</div>
        </div>
        <div class="eq-wrap" id="eqWrap"></div>
        <div class="bar-copy">
          <div class="bar-line bar-lyric" data-preview-lyric>파도가 밀려오듯 네 생각이 와</div>
          <div class="bar-line bar-song" data-preview-title data-preview-title-fallback style="display:none;">파도 소리</div>
        </div>
        <div class="bar-logo">
          <div class="bar-logo-name">POP WiFi</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
