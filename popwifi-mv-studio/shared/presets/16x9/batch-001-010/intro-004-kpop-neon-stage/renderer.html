<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>04 · 새벽 반딧불 — Source Faithful Renderer</title>
<link rel="stylesheet" href="./renderer.css" />
</head>
<body>
<div class="mv-wrap" id="mv">
  <div class="bg"></div>
  <div class="particles" id="particles"></div>

  <div class="frame-layer" id="frameLayer">
    <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
  </div>

  <div class="title-layer">
    <div class="title-main" id="titleMain">반딧불 새벽</div>
    <div class="title-row" id="titleRow">
      <div class="title-line"></div>
      <div class="title-sub">POP WiFi · 팝 와이파이</div>
      <div class="title-line"></div>
    </div>
  </div>

  <div class="sub-layer" id="subLayer">
    <div class="sub-card" id="subCard">
      <div class="sub-item">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <g id="fireflyLike" class="firefly-pop">
            <circle cx="14" cy="14" r="8" fill="rgba(122,232,64,0.15)" stroke="#7ae840" stroke-width="1.2"/>
            <circle cx="14" cy="14" r="4" fill="#7ae840" opacity="0.7" class="firefly-pulse"/>
            <circle cx="14" cy="14" r="2" fill="white" opacity="0.8"/>
          </g>
        </svg>
        <span class="sub-text">좋아요</span>
      </div>
      <div class="sub-divider"></div>
      <div class="sub-item">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <g id="fireflyBell" class="firefly-pop">
            <path d="M14 4C14 4 8 7 8 14L8 19L6 21H22L20 19L20 14C20 7 14 4 14 4Z" stroke="#90f050" stroke-width="1.5" fill="rgba(144,240,80,0.1)"/>
            <circle cx="14" cy="5" r="1.5" fill="#90f050" class="firefly-pulse"/>
            <path d="M11 21C11 22.66 12.34 24 14 24S17 22.66 17 21" stroke="#90f050" stroke-width="1.3" fill="none"/>
          </g>
        </svg>
        <span class="sub-text">구독</span>
      </div>
    </div>
  </div>

  <div class="bottom-bar" id="bottomBar">
    <div class="bar-gradient"></div>
    <div class="bar-topline"></div>
    <div class="bar-inner">
      <div class="disk-wrap">
        <div class="disk"></div>
        <div class="disk-center"></div>
        <div class="disk-icon">🌿</div>
      </div>
      <div class="eq-wrap" id="eqWrap"></div>
      <div class="bar-text">
        <div class="bar-song">반딧불 새벽</div>
        <div class="bar-lyric">어둠 속에 빛나던 작은 불꽃</div>
      </div>
      <div class="bar-logo">
        <div class="bar-logo-name">POP WiFi</div>
        <div class="bar-logo-sub">팝 와이파이</div>
      </div>
    </div>
  </div>
</div>
<script src="./renderer.js"></script>
</body>
</html>
