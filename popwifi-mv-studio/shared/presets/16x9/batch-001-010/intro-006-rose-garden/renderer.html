<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>06 · 장미 정원</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
  <div class="mv-wrap" id="mv">
    <div class="bg"></div>
    <div class="particles" id="particles"></div>
    <div class="frame-layer" id="frameLayer">
      <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
    </div>

    <div class="title-layer">
      <div class="title-main" id="titleMain" data-preview-title>붉은 장미</div>
    </div>

    <div class="sub-layer" id="subLayer">
      <div class="sub-card">
        <style>.sub-anim.active .rplu6vq{animation:rPetallu6vq 0.8s cubic-bezier(0.34,1.4,0.64,1) forwards;}@keyframes rPetallu6vq{0%{transform:scale(0) rotate(-60deg);}100%{transform:scale(1) rotate(0deg);}}</style><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="rplu6vq" style="transform-origin:14px 14px;transform:scale(0)"><ellipse cx="14" cy="14" rx="7" ry="4" fill="#c83040" opacity="0.7" transform="rotate(0,14,14)"/><ellipse cx="14" cy="14" rx="7" ry="4" fill="#c83040" opacity="0.7" transform="rotate(72,14,14)"/><ellipse cx="14" cy="14" rx="7" ry="4" fill="#c83040" opacity="0.7" transform="rotate(144,14,14)"/><ellipse cx="14" cy="14" rx="7" ry="4" fill="#c83040" opacity="0.7" transform="rotate(216,14,14)"/><ellipse cx="14" cy="14" rx="7" ry="4" fill="#c83040" opacity="0.7" transform="rotate(288,14,14)"/><circle cx="14" cy="14" r="3" fill="#ff7080" opacity="0.9"/></g></svg><span class="sub-text" style="color:rgba(240,180,190,0.92)">좋아요</span></div><div class="sub-divider" style="background:rgba(200,60,80,0.25);width:1px;height:22px;"></div><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="rplu6vq" style="transform-origin:14px 14px;transform:scale(0)"><path d="M14 4C14 4 8 7 8 14L8 19L6 21H22L20 19L20 14C20 7 14 4 14 4Z" fill="rgba(200,48,64,0.15)" stroke="#d84050" stroke-width="1.5"/><path d="M11 21C11 22.66 12.34 24 14 24S17 22.66 17 21" stroke="#d84050" stroke-width="1.3" fill="none"/><circle cx="14" cy="5" r="1.5" fill="#d84050"/></g></svg><span class="sub-text" style="color:rgba(240,180,190,0.92)">구독</span></div>
      </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="bar-gradient"></div>
      <div class="bar-topline"></div>
      <div class="bar-inner">
        <div class="disk-wrap">
          <div class="disk"></div>
          <div class="disk-center"></div>
          <div class="disk-icon">🌹</div>
        </div>
        <div class="eq-wrap" id="eqWrap"></div>
        <div class="bar-copy">
          <div class="bar-line bar-lyric" data-preview-lyric>가시 속에 피어난 너의 이름</div>
          <div class="bar-line bar-song" data-preview-title data-preview-title-fallback style="display:none;">붉은 장미</div>
        </div>
        <div class="bar-logo">
          <div class="bar-logo-name">POP WiFi</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
