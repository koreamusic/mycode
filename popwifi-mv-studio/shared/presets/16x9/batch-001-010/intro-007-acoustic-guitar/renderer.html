<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>07 · 어쿠스틱 기타</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
  <div class="mv-wrap" id="mv">
    <div class="bg"></div>
    <div class="particles" id="particles"></div>
    <div class="frame-layer" id="frameLayer">
      <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
    </div>

    <div class="title-layer">
      <div class="title-main" id="titleMain" data-preview-title>어쿠스틱 오후</div>
    </div>

    <div class="sub-layer" id="subLayer">
      <div class="sub-card">
        <style>.sub-anim.active .pkmzp6c{animation:pkStrmzp6c 0.6s ease forwards;}@keyframes pkStrmzp6c{0%{transform:rotate(-30deg);opacity:0;}50%{transform:rotate(10deg);}100%{transform:rotate(0deg);opacity:1;}}</style><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="pkmzp6c" style="transform-origin:14px 14px;opacity:0"><path d="M14 3C20 3 25 9 25 16C25 23 20 27 14 27C8 27 3 23 3 16C3 9 8 3 14 3Z" stroke="#c89040" stroke-width="1.5" fill="rgba(200,144,64,0.15)"/><circle cx="14" cy="16" r="3" fill="#c89040" opacity="0.8"/></g></svg><span class="sub-text" style="color:rgba(235,195,130,0.92)">좋아요</span></div><div class="sub-divider" style="background:rgba(200,150,60,0.25);width:1px;height:22px;"></div><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="pkmzp6c" style="transform-origin:14px 14px;opacity:0"><path d="M14 4C14 4 8 7 8 14L8 19L6 21H22L20 19L20 14C20 7 14 4 14 4Z" stroke="#d8a050" stroke-width="1.6" fill="rgba(216,160,80,0.1)"/><path d="M11 21C11 22.66 12.34 24 14 24S17 22.66 17 21" stroke="#d8a050" stroke-width="1.4" fill="none"/><circle cx="14" cy="5" r="1.5" fill="#d8a050"/></g></svg><span class="sub-text" style="color:rgba(235,195,130,0.92)">구독</span></div>
      </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="bar-gradient"></div>
      <div class="bar-topline"></div>
      <div class="bar-inner">
        <div class="disk-wrap">
          <div class="disk"></div>
          <div class="disk-center"></div>
          <div class="disk-icon">🎸</div>
        </div>
        <div class="eq-wrap" id="eqWrap"></div>
        <div class="bar-copy">
          <div class="bar-line bar-lyric" data-preview-lyric>기타 한 줄에 실어 보낸 마음</div>
          <div class="bar-line bar-song" data-preview-title data-preview-title-fallback style="display:none;">어쿠스틱 오후</div>
        </div>
        <div class="bar-logo">
          <div class="bar-logo-name">POP WiFi</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
