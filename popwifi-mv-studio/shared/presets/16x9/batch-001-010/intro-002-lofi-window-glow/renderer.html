<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>02 · 깊은 밤 피아노 — Source Faithful Renderer</title>
<link rel="stylesheet" href="./renderer.css" />
</head>
<body>
<div class="mv-wrap" id="mv">
  <div class="bg"></div>
  <div class="particles" id="particles"></div>

  <div class="frame-layer" id="frameLayer">
    <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
  </div>

  <div class="title-layer">
    <div class="title-main" id="titleMain">깊은 밤의 선율</div>
    <div class="title-row" id="titleRow">
      <div class="title-line"></div>
      <div class="title-sub">POP WiFi · 팝 와이파이</div>
      <div class="title-line"></div>
    </div>
  </div>

  <div class="sub-layer" id="subLayer">
    <div class="sub-card" id="subCard">
      <div class="sub-item">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <path id="heartPath" class="heart-path" d="M14 23 C14 23 4 16 4 10 C4 7 6.5 4.5 9.5 4.5 C11.5 4.5 13 5.5 14 7 C15 5.5 16.5 4.5 18.5 4.5 C21.5 4.5 24 7 24 10 C24 16 14 23 14 23Z" stroke="#c8a84a" stroke-width="1.8" fill="rgba(200,168,74,0.12)" stroke-linejoin="round"/>
        </svg>
        <span class="sub-text">좋아요</span>
      </div>
      <div class="sub-divider"></div>
      <div class="sub-item">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <g id="bellG" class="bell-g">
            <rect x="8" y="6" width="12" height="10" rx="6" stroke="#d4b456" stroke-width="1.5" fill="rgba(212,180,86,0.1)"/>
            <path d="M6 17H22" stroke="#d4b456" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M11 17C11 18.66 12.34 20 14 20S17 18.66 17 17" stroke="#d4b456" stroke-width="1.2" fill="none"/>
            <line x1="14" y1="4" x2="14" y2="6" stroke="#d4b456" stroke-width="1.5" stroke-linecap="round"/>
          </g>
        </svg>
        <span class="sub-text">구독</span>
      </div>
    </div>
  </div>

  <div class="bottom-bar" id="bottomBar">
    <div class="bar-gradient"></div>
    <div class="bar-topline"></div>
    <div class="bar-inner">
      <div class="disk-wrap">
        <div class="disk"></div>
        <div class="disk-center"></div>
        <div class="disk-icon">🎹</div>
      </div>
      <div class="eq-wrap" id="eqWrap"></div>
      <div class="bar-text">
        <div class="bar-song">깊은 밤의 선율</div>
        <div class="bar-lyric">건반 위에 흐르는 오래된 기억</div>
      </div>
      <div class="bar-logo">
        <div class="bar-logo-name">POP WiFi</div>
        <div class="bar-logo-sub">팝 와이파이</div>
      </div>
    </div>
  </div>
</div>
<script src="./renderer.js"></script>
</body>
</html>
