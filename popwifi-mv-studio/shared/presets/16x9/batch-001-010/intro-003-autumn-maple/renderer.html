<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>03 · 가을 단풍</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
  <div class="mv-wrap" id="mv">
    <div class="bg"></div>
    <div class="particles" id="particles"></div>
    <div class="frame-layer" id="frameLayer">
      <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
    </div>

    <div class="title-layer">
      <div class="title-main" id="titleMain" data-preview-title>가을 편지</div>
    </div>

    <div class="sub-layer" id="subLayer">
      <div class="sub-card">
        <style>.sub-anim.active .lfy38zl{animation:lfDropy38zl 0.8s cubic-bezier(0.34,1.4,0.64,1) forwards;}@keyframes lfDropy38zl{0%{transform:translateY(-20px) rotate(-45deg);opacity:0;}100%{transform:translateY(0) rotate(0deg);opacity:1;}}.sub-anim.active .bwy38zl{animation:bWigy38zl 0.6s ease 0.5s 2;}@keyframes bWigy38zl{0%,100%{transform:rotate(0);}33%{transform:rotate(20deg);}66%{transform:rotate(-20deg);}}</style><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="lfy38zl" style="opacity:0"><path d="M14 24C14 24 4 17 4 11C4 8 6.5 5.5 9.5 5.5C11.5 5.5 13 6.5 14 8C15 6.5 16.5 5.5 18.5 5.5C21.5 5.5 24 8 24 11C24 17 14 24 14 24Z" fill="#d4701a" opacity="0.85" stroke="#e08030" stroke-width="1"/></g></svg><span class="sub-text" style="color:rgba(240,190,120,0.92)">좋아요</span></div><div class="sub-divider" style="background:rgba(210,120,40,0.25);width:1px;height:22px;"></div><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="bwy38zl" style="transform-origin:14px 5px"><path d="M14 3C14 3 8 6 8 13L8 19L6 21H22L20 19L20 13C20 6 14 3 14 3Z" stroke="#e08030" stroke-width="1.6" fill="rgba(224,128,48,0.1)"/><path d="M11 21C11 22.66 12.34 24 14 24S17 22.66 17 21" stroke="#e08030" stroke-width="1.4" fill="none"/><circle cx="14" cy="4" r="1.5" fill="#e08030"/></g></svg><span class="sub-text" style="color:rgba(240,190,120,0.92)">구독</span></div>
      </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="bar-gradient"></div>
      <div class="bar-topline"></div>
      <div class="bar-inner">
        <div class="disk-wrap">
          <div class="disk"></div>
          <div class="disk-center"></div>
          <div class="disk-icon">🍂</div>
        </div>
        <div class="eq-wrap" id="eqWrap"></div>
        <div class="bar-copy">
          <div class="bar-line bar-lyric" data-preview-lyric>낙엽처럼 떨어지던 그날의 기억</div>
          <div class="bar-line bar-song" data-preview-title data-preview-title-fallback style="display:none;">가을 편지</div>
        </div>
        <div class="bar-logo">
          <div class="bar-logo-name">POP WiFi</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
