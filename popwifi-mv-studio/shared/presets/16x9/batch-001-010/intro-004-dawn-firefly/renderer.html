<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>04 · 새벽 반딧불</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
  <div class="mv-wrap" id="mv">
    <div class="bg"></div>
    <div class="particles" id="particles"></div>
    <div class="frame-layer" id="frameLayer">
      <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
    </div>

    <div class="title-layer">
      <div class="title-main" id="titleMain" data-preview-title>반딧불 새벽</div>
    </div>

    <div class="sub-layer" id="subLayer">
      <div class="sub-card">
        <style>.sub-anim.active .ff2pqoh{animation:ffP2pqoh 0.5s ease forwards;}@keyframes ffP2pqoh{0%{transform:scale(0);}60%{transform:scale(1.3);}100%{transform:scale(1);}}</style><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="ff2pqoh" style="transform-origin:14px 14px;transform:scale(0)"><circle cx="14" cy="14" r="8" fill="rgba(122,232,64,0.15)" stroke="#7ae840" stroke-width="1.2"/><circle cx="14" cy="14" r="4" fill="#7ae840" opacity="0.7"><animate attributeName="r" values="4;6;4" dur="1s" repeatCount="indefinite"/></circle><circle cx="14" cy="14" r="2" fill="white" opacity="0.8"/></g></svg><span class="sub-text" style="color:rgba(160,240,120,0.92)">좋아요</span></div><div class="sub-divider" style="background:rgba(80,200,60,0.25);width:1px;height:22px;"></div><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="ff2pqoh" style="transform-origin:14px 14px;transform:scale(0)"><path d="M14 4C14 4 8 7 8 14L8 19L6 21H22L20 19L20 14C20 7 14 4 14 4Z" stroke="#90f050" stroke-width="1.5" fill="rgba(144,240,80,0.1)"/><circle cx="14" cy="5" r="1.5" fill="#90f050"><animate attributeName="opacity" values="0.5;1;0.5" dur="0.8s" repeatCount="indefinite"/></circle><path d="M11 21C11 22.66 12.34 24 14 24S17 22.66 17 21" stroke="#90f050" stroke-width="1.3" fill="none"/></g></svg><span class="sub-text" style="color:rgba(160,240,120,0.92)">구독</span></div>
      </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="bar-gradient"></div>
      <div class="bar-topline"></div>
      <div class="bar-inner">
        <div class="disk-wrap">
          <div class="disk"></div>
          <div class="disk-center"></div>
          <div class="disk-icon">🌿</div>
        </div>
        <div class="eq-wrap" id="eqWrap"></div>
        <div class="bar-copy">
          <div class="bar-line bar-lyric" data-preview-lyric>어둠 속에 빛나던 작은 불꽃</div>
          <div class="bar-line bar-song" data-preview-title data-preview-title-fallback style="display:none;">반딧불 새벽</div>
        </div>
        <div class="bar-logo">
          <div class="bar-logo-name">POP WiFi</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
