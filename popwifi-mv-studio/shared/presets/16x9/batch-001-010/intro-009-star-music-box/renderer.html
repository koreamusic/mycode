<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>09 · 별빛 오르골</title>
  <link rel="stylesheet" href="./renderer.css" />
</head>
<body>
  <div class="mv-wrap" id="mv">
    <div class="bg"></div>
    <div class="particles" id="particles"></div>
    <div class="frame-layer" id="frameLayer">
      <svg id="frameSvg" viewBox="0 0 900 506" fill="none" width="100%" height="100%" style="position:absolute;inset:0;"></svg>
    </div>

    <div class="title-layer">
      <div class="title-main" id="titleMain" data-preview-title>별에게 닿는 노래</div>
    </div>

    <div class="sub-layer" id="subLayer">
      <div class="sub-card">
        <style>.sub-anim.active .sp3msrf{animation:sBurst3msrf 0.7s cubic-bezier(0.34,1.6,0.64,1) forwards;}@keyframes sBurst3msrf{0%{transform:scale(0) rotate(-45deg);}60%{transform:scale(1.25) rotate(10deg);}100%{transform:scale(1) rotate(0deg);}}</style><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><polygon class="sp3msrf" points="14,3 16.8,10.4 24.7,10.4 18.5,15 20.9,22.5 14,18 7.1,22.5 9.5,15 3.3,10.4 11.2,10.4" fill="#b090e8" opacity="0.9" style="transform-origin:14px 14px;transform:scale(0)"/></svg><span class="sub-text" style="color:rgba(210,190,250,0.92)">좋아요</span></div><div class="sub-divider" style="background:rgba(160,130,220,0.25);width:1px;height:22px;"></div><div class="sub-anim sub-item"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><g class="sp3msrf" style="transform-origin:14px 14px;transform:scale(0)"><path d="M14 4C14 4 8 7 8 14L8 19L6 21H22L20 19L20 14C20 7 14 4 14 4Z" stroke="#c0a0f8" stroke-width="1.6" fill="rgba(192,160,248,0.1)"/><path d="M11 21C11 22.66 12.34 24 14 24S17 22.66 17 21" stroke="#c0a0f8" stroke-width="1.4" fill="none"/><circle cx="14" cy="5" r="1.5" fill="#c0a0f8"/></g></svg><span class="sub-text" style="color:rgba(210,190,250,0.92)">구독</span></div>
      </div>
    </div>

    <div class="bottom-bar" id="bottomBar">
      <div class="bar-gradient"></div>
      <div class="bar-topline"></div>
      <div class="bar-inner">
        <div class="disk-wrap">
          <div class="disk"></div>
          <div class="disk-center"></div>
          <div class="disk-icon">⭐</div>
        </div>
        <div class="eq-wrap" id="eqWrap"></div>
        <div class="bar-copy">
          <div class="bar-line bar-lyric" data-preview-lyric>별 하나에 담은 너의 이름</div>
          <div class="bar-line bar-song" data-preview-title data-preview-title-fallback style="display:none;">별에게 닿는 노래</div>
        </div>
        <div class="bar-logo">
          <div class="bar-logo-name">POP WiFi</div>
        </div>
      </div>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
