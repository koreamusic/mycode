<section class="page active" id="page-lyrics">
  <div class="page-head">
    <p>LYRICS</p>
    <h1>가사 마킹</h1>
    <span>가사를 입력하고 타임코드를 지정합니다. 렌더 프리셋에 싱크 데이터를 연결합니다.</span>
  </div>

  <div class="grid two">
    <article class="card">
      <h2>가사 입력</h2>
      <label class="field-label">곡 제목</label>
      <input class="text-input" id="lyrics-title" placeholder="예: My Song" />
      <label class="field-label">가사 (줄바꿈으로 구분)</label>
      <textarea
        class="text-input"
        id="lyrics-text"
        rows="10"
        placeholder="가사를 한 줄씩 입력하세요..."
        style="resize: vertical; font-family: inherit;"
      ></textarea>
      <button class="control-btn" id="lyrics-parse-btn" style="margin-top: 0.75rem;">가사 파싱</button>
    </article>

    <article class="card">
      <h2>타임코드 마킹</h2>
      <p>가사 파싱 후 각 줄에 타임코드를 지정합니다.</p>
      <div id="lyrics-lines" class="queue-empty">가사를 입력하고 파싱하세요.</div>
    </article>

    <article class="card">
      <h2>싱크 미리보기</h2>
      <p>마킹된 타임코드와 가사가 표시됩니다.</p>
      <pre id="lyrics-preview" style="font-size: 0.75rem; overflow: auto; max-height: 200px;">싱크 데이터 없음</pre>
    </article>

    <article class="card">
      <h2>내보내기</h2>
      <p>마킹 완료 후 프리셋에 연결할 싱크 JSON을 내보냅니다.</p>
      <button class="control-btn" id="lyrics-export-btn" disabled>싱크 JSON 내보내기</button>
    </article>
  </div>
</section>
