<section class="page active" id="page-settings">
  <div class="page-head">
    <p>SETTINGS</p>
    <h1>설정</h1>
    <span>FFmpeg, 폰트, 출력 경로, 자동 절전 설정을 관리합니다.</span>
  </div>

  <div class="grid two">
    <article class="card">
      <h2>렌더 설정</h2>
      <label class="field-label">FFmpeg Path</label>
      <input class="text-input" data-config-key="ffmpegPath" value="ffmpeg" />
      <label class="field-label">Output Folder</label>
      <input class="text-input" data-config-key="outputDir" value="output" />
      <label class="field-label">Music Folder</label>
      <input class="text-input" data-config-key="musicDir" value="music" />
      <button class="control-btn primary" id="settings-save-btn" style="margin-top:0.75rem;">설정 저장</button>
      <div id="settings-save-result" style="margin-top:0.4rem;font-size:0.8rem;opacity:0.7;"></div>
    </article>
    <article class="card">
      <h2>폰트 관리</h2>
      <p style="font-size:12px;color:var(--muted);margin-bottom:12px;">프리셋 config.json에서 사용 중인 폰트 목록입니다. Google Fonts에서 다운로드하세요.</p>
      <button class="control-btn" id="fonts-refresh-btn">폰트 목록 새로고침</button>
      <div id="fonts-list" style="margin-top:12px;"></div>
    </article>
    <article class="card">
      <h2>프리셋 배치 가져오기</h2>
      <p>배치 JSON 파일을 업로드해서 프리셋을 등록합니다.</p>
      <label class="field-label">JSON 파일 선택</label>
      <input type="file" id="preset-import-file" accept=".json" style="margin-bottom:0.75rem;" />
      <button class="control-btn" id="preset-import-btn">배치 가져오기</button>
      <div id="preset-import-result" style="margin-top:0.5rem;font-size:0.8rem;opacity:0.7;"></div>
    </article>
  </div>
</section>
