<section class="page active" id="page-project">
  <div class="page-head">
    <p>PROJECT</p>
    <h1>소스 파일 설정</h1>
    <span>음원, 커버 이미지, 곡 정보를 입력합니다. 저장 후 렌더 드래프트에 반영됩니다.</span>
  </div>

  <div class="work-layout">
    <div class="main-panel">
      <article class="card">
        <h2>곡 정보</h2>
        <div class="field-row">
          <label class="field-label" for="source-title">곡 제목</label>
          <input class="field-input" type="text" id="source-title" placeholder="예: 봄날" autocomplete="off" />
        </div>
        <div class="field-row">
          <label class="field-label" for="source-artist">아티스트</label>
          <input class="field-input" type="text" id="source-artist" placeholder="예: BTS" autocomplete="off" />
        </div>
      </article>

      <article class="card" style="margin-top: 1rem;">
        <h2>파일 경로</h2>
        <p style="font-size:12px; color:var(--muted); margin-bottom: 12px;">로컬 절대 경로 또는 서버 상대 경로를 입력하세요.</p>
        <div class="field-row">
          <label class="field-label" for="source-music">음원 파일 <span class="field-ext">.mp3 / .flac / .wav</span></label>
          <input class="field-input" type="text" id="source-music" placeholder="/Users/me/music/song.mp3" autocomplete="off" />
        </div>
        <div class="field-row">
          <label class="field-label" for="source-cover">커버 이미지 <span class="field-ext">.jpg / .png</span></label>
          <input class="field-input" type="text" id="source-cover" placeholder="/Users/me/covers/cover.jpg" autocomplete="off" />
        </div>
        <div class="field-row">
          <label class="field-label" for="source-lyrics">가사 싱크 파일 <span class="field-ext">.json</span></label>
          <input class="field-input" type="text" id="source-lyrics" placeholder="data/lyrics-sync.json (선택)" autocomplete="off" />
        </div>

        <div class="field-actions">
          <button class="control-btn" id="source-save-btn">저장</button>
          <span class="field-result" id="source-save-result"></span>
        </div>
      </article>
    </div>

    <div class="side-panel">
      <article class="card">
        <h2>현재 소스</h2>
        <div id="source-preview" class="source-preview-list">
          <p class="queue-empty">저장된 소스 없음</p>
        </div>
      </article>

      <article class="card" style="margin-top: 1rem;">
        <h2>최근 렌더 결과</h2>
        <div id="recentRenderResults" class="render-results-list">렌더 결과를 불러오는 중...</div>
      </article>
    </div>
  </div>
</section>
