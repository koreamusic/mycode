<!doctype html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pop WiFi MV Studio</title>
  <link rel="stylesheet" href="./styles/app.css" />
</head>
<body>
  <div class="studio-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">PW</div>
        <div>
          <strong>Pop WiFi</strong>
          <span>MV Studio · PC First</span>
        </div>
      </div>
      <div class="status-pills">
        <span class="pill ok" id="serverStatus">서버 확인 중</span>
        <span class="pill warn" id="renderStatus">렌더 대기</span>
        <span class="pill">모바일 확인용</span>
      </div>
    </header>

    <aside class="sidebar">
      <button class="nav-btn active" data-page="project">프로젝트</button>
      <button class="nav-btn" data-page="longform">롱폼 인트로</button>
      <button class="nav-btn" data-page="shorts">숏츠 프리셋</button>
      <button class="nav-btn" data-page="lyrics">가사 마킹</button>
      <button class="nav-btn" data-page="landing">랜딩 검수</button>
      <button class="nav-btn" data-page="queue">렌더 큐</button>
      <button class="nav-btn" data-page="settings">설정</button>
      <button class="nav-btn" data-page="faq">FAQ</button>
    </aside>

    <main class="page-area">
      <div id="pageOutlet" class="page-outlet" aria-live="polite"></div>
    </main>
  </div>

  <script type="module" src="./scripts/app.js"></script>
</body>
</html>
