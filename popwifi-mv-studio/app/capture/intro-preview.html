<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pop WiFi MV Studio — Intro Capture</title>
  <link rel="stylesheet" href="/app/styles/app.css" />
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
    }
    .capture-root {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      background: #000;
    }
    .capture-root .preview-card {
      width: 100vw;
      height: 100vh;
      max-width: none;
      border-radius: 0;
      border: 0;
      box-shadow: none;
    }
  </style>
</head>
<body>
  <main class="capture-root">
    <div class="preview-card wide" id="capturePreview">INTRO CAPTURE PREVIEW</div>
  </main>
  <script type="module" src="/app/scripts/capture/intro-preview-capture.js"></script>
</body>
</html>
